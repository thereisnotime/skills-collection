# lychee config — repo-side broken-link checker
# Invoked by .github/workflows/check-links.yml on PRs touching .md files
# and on the weekly schedule. Local: `lychee --config .lychee.toml '**/*.md'`

# Skip these paths entirely. Per `lychee --help`, exclude_path values are
# regular expressions matched against the candidate file path. We dot-escape
# leading dots since `.git` as a literal would also match `Xgit` etc.
exclude_path = [
  "node_modules",
  "\\.git/",
  "marketplace/dist",
  "marketplace/\\.astro",
  "marketplace/\\.cache",
  "marketplace/public/downloads",
  "plugins/[^/]+/dist",
  "plugins/[^/]+/node_modules",
  "freshie/cache",
  "\\.audit-harness",
  "coverage",
  "\\.pnpm-store",
  # VitePress-style site that uses its own root-relative routing
  # (`/skills/foo`); lychee can't resolve those without the framework
  # build step. Owned/maintained separately as a skill-enhancer.
  "plugins/skill-enhancers/axiom/docs",
  # Test fixtures intentionally reference files that do not exist —
  # they exist to test the validator's broken-reference handling.
  # Treating them as real broken links is a category error.
  "tests/fixtures",
]

# HTTP statuses to treat as success.
# 403 / 429 are routinely returned by GitHub, Twitter/X, and other rate-limiting
# hosts even when the link is fine — accept them rather than spam false positives.
# 307 / 308 are routinely returned by login-gated dashboards (Mistral, Clerk,
# Juicebox) that redirect unauthenticated requests; the link target still exists.
accept = [200, 202, 206, 301, 302, 304, 307, 308, 403, 429]

# Per-request timeout (seconds). Bumped 20 → 30 because high-traffic
# docs hosts (openrouter.ai/docs/*, lokalise public docs, etc.) routinely
# take 20-25s for the first cold-cache lychee hit from a fresh CI runner.
timeout = 30

# Allow up to N redirects before giving up
max_redirects = 10

# Cache successful checks for a day so re-runs don't re-hit every host
cache = true
max_cache_age = "1d"

# Be polite — don't fire 100 concurrent requests at one host
max_concurrency = 4

# Skip these URL patterns entirely
exclude = [
  # ── Local dev hosts ──
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://\\[::1\\]",
  # Tailnet hosts (intentsolutions VPS internal)
  "^https?://intentsolutions(\\.|:)",
  "^https?://167\\.86\\.106\\.29",
  # Pure anchor links (no path component)
  "^#",
  # Example placeholder domains
  "^https?://example\\.(com|org|net)",
  "^https?://target\\.example",
  "^https?://your-",
  # Placeholder schemes from code samples
  "^mailto:.*example",

  # ── Known-flaky external sources we cite in references ──
  # Each entry documents WHY it's excluded.

  # docs.windsurf.ai — Windsurf rebranded to Codeium; docs.windsurf.ai
  # no longer resolves. ~75 stale references in skills/wispr-*/SKILL.md
  # and the windsurf SaaS pack. Tracked separately for URL rewrite.
  "^https?://docs\\.windsurf\\.ai",
  "^https?://marketplace\\.windsurf\\.ai",

  # Status pages — frequently rate-limited or returning non-2xx when
  # the host is healthy. These are reference links, not content.
  "^https?://status\\.[^/]+\\.",
  "^https?://www\\.atlassianstatuspage\\.io",

  # Lokalise docs — return 404 on /reference/* AND /docs/* paths that
  # previously existed; the platform moved its docs structure in 2026-Q2.
  # Tracked for URL rewrite in the lokalise SaaS pack.
  "^https?://developers\\.lokalise\\.com/(reference|docs)/",
  "^https?://community\\.lokalise\\.com",

  # Miro developer portal — /docs/* and /reference/* return 404 after
  # 2026 portal reorganization. Tracked for URL rewrite in miro SaaS pack.
  "^https?://developers\\.miro\\.com/(docs|reference)/",

  # Podium API docs — 404s on /reference/* paths since Podium reorganized
  # their developer portal. Pack-level URL rewrite tracked separately.
  "^https?://docs\\.podium\\.com/reference/",

  # BambooHR docs — same pattern; /reference/* paths returning 404 after
  # their documentation portal restructure.
  "^https?://documentation\\.bamboohr\\.com/reference/",

  # Hootsuite developer portal — /docs/api 404; replatform in progress.
  "^https?://developer\\.hootsuite\\.com/docs/api",

  # DefiLlama — /docs/api returns 404; API docs moved to defillama.com/pro-api.
  "^https?://defillama\\.com/docs/api",

  # Apollo, Notion, Cast.ai, Supabase, MaintainX, Mindtickle, Linktree,
  # Speak, Twinmind, Fathom — login-gated or restructured developer
  # portals that return 4xx/5xx to lychee but are valid for users.
  "^https?://docs\\.apollo\\.io/reference/",
  "^https?://developers\\.notion\\.com/changelog",
  "^https?://docs\\.cast\\.ai/docs/",
  "^https?://support\\.cast\\.ai",
  "^https?://supabase\\.com/docs/guides/platform/reports",
  "^https?://supabase\\.com/docs/reference/javascript/auth-error-codes",
  "^https?://developer\\.maintainx\\.com",
  "^https?://developers\\.mindtickle\\.com",
  "^https?://developers\\.linktr\\.ee",
  "^https?://developers\\.speak\\.com",
  "^https?://(docs|developers)\\.fathom\\.video",
  "^https?://fathom\\.video/api",
  "^https?://twinmind\\.com/(docs/api|ear-3)",
  "^https?://docs\\.twinmind\\.com",
  "^https?://docs\\.klingai\\.com",
  "^https?://app\\.lindy\\.ai",
  "^https?://api\\.juicebox\\.ai",

  # Defunct or migrated single-purpose URLs cited in older skills.
  "^https?://aif360\\.mybluemix\\.net",     # IBM AIF360 — domain retired
  "^https?://www\\.fpanda\\.org",           # FP&A community — TLS issues
  "^https?://jolokia\\.org/reference/html/security\\.html",
  "^https?://www\\.postgresql\\.org/docs/current/pgaudit\\.html",
  "^https?://roboticforce\\.io/docs/sugar",
  "^https?://claudecodeplugins\\.io/docs/web-to-github-issue",
  "^https?://cloud\\.google\\.com/vertex-ai/docs/agent-engine",
  "^https?://content-security-policy\\.com",
  "^https?://www\\.awwwards\\.com/books",
  "^https?://jxa-examples\\.akjems\\.com",
  "^https?://mychart\\.epic\\.com",
  "^https?://gcc\\.guidewire\\.com",
  "^https?://docs\\.claude\\.ai/code",       # canonical is code.claude.com
  "^https?://help\\.finta\\.com",
  "^https?://support\\.flexport\\.com",
  "^https?://partners\\.abridge\\.com",

  # Bare hostname placeholders from observability template code
  "^https?://(alertmanager|grafana|prometheus)(:|/|$)",

  # Historical blog-post references that link-rotted. The posts are
  # journals of what happened at the time; the dead links are part of
  # the record. Add specifically rather than excluding all of GitHub.
  "^https?://github\\.com/jeremylongshore/Content-Nuke-Claude/releases/tag/v2\\.1\\.0",
  "^https?://hustle-app-zk63g3embq-uc\\.a\\.run\\.app",
  "^https?://tonsofskills\\.com/irsb-ecosystem",
  # GNU manual mirror is slow; routinely times out from CI runners.
  # Documentation links, not load-bearing.
  "^https?://www\\.gnu\\.org/software/(bash|gawk)/manual/",

  # docs.sigstore.dev — timing out from CI runners (host throttles).
  "^https?://docs\\.sigstore\\.dev",

  # ── Healthy domains the GitHub Actions runner network can't reliably
  # reach. These are top-tier, live, well-maintained reference docs that
  # routinely throw Connection-failed / Timeout from CI even with 3
  # retries and 30s timeout. The links resolve fine from any real user's
  # browser. Excluding ONLY because of CI-runner reachability, not link
  # rot. If/when runner network behavior changes, remove these.
  "^https?://kubernetes\\.io/",
  "^https?://vitest\\.dev/",
  "^https?://vitejs\\.dev/",
  "^https?://axios-http\\.com/",
  "^https?://design-tokens\\.github\\.io/",
  # supabase.com is referenced in many places — when it 502s from a
  # runner, the cached error multiplies. Healthy domain; runner-side issue.
  "^https?://supabase\\.com/",
  # eslint.org, spacy.io, response.pagerduty.com — same pattern. Major
  # reference docs that routinely time out from GH Actions runners.
  "^https?://eslint\\.org/",
  "^https?://spacy\\.io/",
  "^https?://response\\.pagerduty\\.com/",

  # ── Blog post cross-references in marketplace/src/content/blog-posts/
  # Daily blog posts cross-link each other forward and backward. Many of
  # the referenced slugs are queued by the `/blog-backfill` skill but
  # haven't deployed to tonsofskills.com/blog yet. Lychee sees 404s for
  # the not-yet-deployed posts. Backfill catches them up on its own
  # cadence; lychee shouldn't fail CI on backfill timing.
  #
  # If a real broken cross-reference (typo'd slug, deleted post) needs
  # catching, add a more specific exclude OR run `/blog-backfill` to
  # verify the destination exists.
  #
  # Also excluding /blog/startai/* — those are startaitools.com posts
  # mirrored under tonsofskills.com/blog/startai/, same backfill story.
  "^https?://tonsofskills\\.com/blog/",
  # startaitools.com posts likewise rely on backfill cadence.
  "^https?://startaitools\\.com/(posts|mcp-for-beginners|research|tiny-recursive-models)/",
]

# Retry transient failures before giving up. GitHub Actions runners
# routinely have momentary DNS/connection blips against perfectly healthy
# hosts (kubernetes.io, docs.* hubs). Without retries one runner-side
# blip = one CI failure. 5 retries with 3s backoff (= up to 15s extra wall
# time per failing URL) is the sweet spot we've seen actually clear flakes.
max_retries = 5
retry_wait_time = 3

# User-agent so target hosts can identify us in their logs
user_agent = "lychee/intentsolutions-claude-code-plugins-link-check"
