      - '.claude-plugin/**'
      - 'hooks/**'
      - 'scripts/**'
      - 'skills/**'
      - 'README.md'
      - 'LICENSE'
    exclude:
      - 'node_modules/**'
      - '.git/**'
      - '*.log'

  - name: pr-to-spec
    description: The flight envelope for agentic coding — structured specs with intent drift detection
    repo: jeremylongshore/pr-to-prompt
    source_path: .
    target_path: plugins/mcp/pr-to-spec
    author:
      name: Jeremy Longshore
      github: jeremylongshore
      email: jeremy@intentsolutions.io
    license: MIT
    category: code-quality
    verified: true
    include:
      - '.claude-plugin/**'
      - '.mcp.json'
      - 'src/servers/**'
      - '.claude/skills/**'
      - 'dist/servers/**'
      - 'dist/index.js'
      - 'dist/index.d.ts'
      - 'dist/core/**'
      - 'README.md'
      - 'LICENSE'
    exclude:
      - 'node_modules/**'
      - '.git/**'
      - '*.log'
      - 'tests/**'
      - 'src/!(servers)/**'
      - 'dist/cli/**'
      - 'dist/action/**'

  - name: slack-channel
    description: Two-way Slack channel for Claude Code — chat from Slack DMs and channels via Socket Mode
    repo: jeremylongshore/claude-code-slack-channel
    source_path: .
    target_path: plugins/mcp/slack-channel
    author:
      name: Jeremy Longshore
      github: jeremylongshore
      email: jeremy@intentsolutions.io
    license: MIT
    category: productivity
    verified: true
    include:
      - '.claude-plugin/**'
      - '.mcp.json'
      # '*.ts' (not explicit server.ts/lib.ts) — server.ts imports
      # journal.ts, manifest.ts, policy.ts. Listing files explicitly drops
      # the imports and produces a non-functional mirror (see #645).
      - '*.ts'
      # features/ holds upstream's gate-properties + runner test suites.
      # Tests are pure-unit (bun:test against lib functions) — no Slack creds
      # required. Synced so `bun test` finds them and CI passes (claude-7tig.1).
      - 'features/**'
      - 'package.json'
      # tsconfig.json drives `tsc --noEmit` (the typecheck script in upstream
      # package.json). Without it, tsc dumps help text and exits 1 — making
      # CI's Type checking step fail. Synced together with the source files
      # it references (claude-7tig.1).
      - 'tsconfig.json'
      - '.npmrc'
      - 'skills/**'
      - 'ACCESS.md'
      - 'README.md'
      - 'LICENSE'
    exclude:
      - 'node_modules/**'
      - '.git/**'
      - '*.log'

  - name: x-bug-triage
    description: Closed-loop bug triage — X complaints → clusters → repo evidence → owner routing → Slack review → filed issues
    repo: jeremylongshore/x-bug-triage-plugin
    source_path: .
    target_path: plugins/mcp/x-bug-triage
    author:
      name: Jeremy Longshore
      github: jeremylongshore
      email: jeremy@intentsolutions.io
    license: MIT
    category: devops
    verified: true
    include:
      - '.claude-plugin/**'
      - '.mcp.json'
      - 'skills/**'
      - 'agents/**'
      - 'hooks/**'
      - 'mcp/**'
      - 'lib/**'
      # db/ holds migrate.ts + schema.sql + db/migrations/*.sql — source
      # code imported by lib/*.test.ts (`from "../db/migrate"`). Stripping
      # it breaks the vendored test suite (claude-7tig.1 follow-up).
      - 'db/**'
      - 'config/**'
      - 'scripts/**'
      - 'integrations/**'
      - 'package.json'
      - 'tsconfig.base.json'
      - 'README.md'
      - 'LICENSE'
    exclude:
      - 'node_modules/**'
      - '.git/**'
      - '*.log'
      - 'data/**'
      - 'tests/**'
      - 'bun.lock'
      - '**/.gitkeep'

