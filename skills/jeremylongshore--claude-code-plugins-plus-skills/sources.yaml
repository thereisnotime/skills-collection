    repo: numman-ali/n-skills
    source_path: skills/tools/gastown
    target_path: plugins/community/gastown
    author:
      name: Numman Ali
      github: numman-ali
      email: numman.ali@gmail.com
    license: Apache-2.0
    category: community
    verified: true
    # Files to sync (relative to source_path)
