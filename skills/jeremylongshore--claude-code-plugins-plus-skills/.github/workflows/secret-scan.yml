name: Secret Scan

# Professional secret scanning. Replaces the ad-hoc regex scan inside
# validate-plugins.yml for the purpose of catching credential leaks.
#
# - gitleaks: fast rule-based scan on every PR and push to main.
# - trufflehog: verified-credentials scan weekly against full history.
#
# Context: 2026-04 external NLPM audit flagged that the prior regex scan was
# insufficient (missed env-var leaks, provider-specific key shapes, etc.).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly full-history verified scan (Sundays 04:17 UTC).
    - cron: '17 4 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  trufflehog:
    # Verified-credentials scan — runs only on schedule or manual dispatch.
    # Skips PRs (slow) and push (gitleaks already ran).
    name: trufflehog (verified)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified --fail

      - name: Notify Slack on failure
        if: failure() && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_OPERATION_HIRED_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "No Slack webhook configured; skipping notification."
            exit 0
          fi
          payload=$(jq -n \
            --arg text ":rotating_light: Weekly trufflehog scan found *verified* credentials in main. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{text: $text}')
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK"
