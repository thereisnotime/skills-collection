name: Update Metrics

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run - show changes without applying'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    name: Update README badges and repo description

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run metrics update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          node scripts/update-metrics.mjs $FLAGS

      - name: Commit changes
        if: inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update plugin/skill count badges [automated]"
            git push
          fi
