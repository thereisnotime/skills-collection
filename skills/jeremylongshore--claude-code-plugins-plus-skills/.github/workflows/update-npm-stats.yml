name: Update npm download stats (daily)

# Fetches fresh download counts for every @intentsolutionsio/* package plus
# our legacy-named ones (maintainer-filter), writes
# marketplace/src/data/npm-stats.json + the README NPM-STATS bounded block,
# and opens (or updates) a PR with the diff.
#
# Why a PR instead of a direct push to main:
#   `main` is branch-protected (required status checks). A direct
#   `git push origin main` is rejected with `GH006: Protected branch update
#   failed`. The hand-rolled bash below mirrors the pattern established in
#   PR #642 (sync-external.yml): commit to a stable branch, force-push,
#   open PR if none exists. Idempotent across re-runs.

on:
  schedule:
    - cron: '15 0 * * *'  # 00:15 UTC daily
  workflow_dispatch:       # manual refresh

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: npm-stats-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Fetch stats and update artifacts
        run: node scripts/fetch-npm-stats.mjs

      - name: Detect changes
        id: changes
        run: |
          set -euo pipefail
          if git diff --quiet marketplace/src/data/npm-stats.json README.md; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No stats changes today — nothing to commit."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + open/update PR
        if: steps.changes.outputs.has_changes == 'true'
        # Hand-rolled PR pattern (mirrors sync-external.yml from PR #642).
        # `main` is branch-protected; pushing directly returns GH006. Push to
        # a stable branch and let CI run the protected checks via a PR.
        # `--no-verify` skips local git hooks (husky / lint-staged) so the
        # automated commit doesn't OOM on prettier across the staged set.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="automation/npm-stats"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-rebase onto current main so each daily run produces a clean diff
          # rather than stacking commits on a stale branch.
          git checkout -B "$BRANCH"

          git add marketplace/src/data/npm-stats.json README.md
          git commit --no-verify -m "chore(stats): daily npm download refresh

          Auto-generated by .github/workflows/update-npm-stats.yml.

          jeremy made me do it
          -claude"

          git push --force-with-lease origin "$BRANCH"

          if ! gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            gh pr create \
              --title "📦 Daily npm download stats refresh" \
              --head "$BRANCH" \
              --base main \
              --label "automated,stats" \
              --body "## Daily npm Download Stats

          Refreshes \`marketplace/src/data/npm-stats.json\` and the README \`NPM-STATS\` block with current download counts from npm.

          - **Source:** \`scripts/fetch-npm-stats.mjs\`
          - **Cadence:** daily at 00:15 UTC
          - **Idempotent:** re-running force-pushes \`automation/npm-stats\`; this PR auto-updates instead of stacking PRs.

          Safe to merge; no code changes, only data/markdown."
          fi

      - name: Summary
        run: |
          echo "## 📦 npm Stats Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ Stats changed; PR opened or updated on \`automation/npm-stats\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✓ No stats changes; nothing to do." >> "$GITHUB_STEP_SUMMARY"
          fi
