name: Update npm download stats (daily)

# Fetches fresh download counts for every @intentsolutionsio/* package plus
# our legacy-named ones (maintainer-filter), writes
# marketplace/src/data/npm-stats.json + the README NPM-STATS bounded block,
# commits the diff back to main. The marketplace deploy workflow watches
# marketplace/** so the website auto-redeploys with fresh numbers.

on:
  schedule:
    - cron: '15 0 * * *'  # 00:15 UTC daily
  workflow_dispatch:       # manual refresh

permissions:
  contents: write

concurrency:
  group: npm-stats-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full clone so we can push the commit cleanly
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Fetch stats and update artifacts
        run: node scripts/fetch-npm-stats.mjs

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          if git diff --quiet marketplace/src/data/npm-stats.json README.md; then
            echo "No stats changes today — nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketplace/src/data/npm-stats.json README.md
          git commit -m "chore(stats): daily npm download refresh

          Auto-generated by .github/workflows/update-npm-stats.yml.

          Jeremy made me do it
          -claude"
          git push
