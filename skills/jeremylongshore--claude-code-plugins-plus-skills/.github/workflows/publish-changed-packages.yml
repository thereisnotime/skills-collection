name: Publish changed @intentsolutionsio packages

# Runs on every push to main that touches a plugin directory. For each
# changed plugin whose package.json `version` is not yet on npm:
#   1. Publishes to npm with provenance.
#   2. Creates an annotated git tag of the form `<scope>/<name>@<version>`.
#   3. Opens a GitHub Release linked to that tag with auto-generated notes.
#
# The version-bump trigger is provided by `auto-bump-on-pr.yml` — it runs on
# every PR, detects which plugins' source files changed, bumps each plugin's
# patch version, and commits back to the PR branch. So the loop is:
#   PR opened → CI auto-bumps changed plugins → merge to main → this
#   workflow publishes + tags + releases.
#
# For intentional minor / major bumps, a human edits the version manually
# in the PR; the auto-bump bumper is idempotent (it skips PRs where only
# package.json changed) so the manual bump rides through clean.
#
# Only handles @intentsolutionsio/* scoped packages. Other packages (the 12
# pre-existing heterogeneous ones, plus packages/cli which has its own
# tag-based publish) are ignored here.

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'

permissions:
  contents: write       # tag push + release creation
  id-token: write       # npm provenance

concurrency:
  group: npm-publish-main
  cancel-in-progress: false

jobs:
  detect:
    name: Detect changed plugin packages
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.build.outputs.count }}
      packages_json: ${{ steps.build.outputs.packages_json }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # need previous commit to diff against

      - name: Build change list
        id: build
        run: |
          set -euo pipefail
          # Changed files in this push
          git diff --name-only HEAD~1 HEAD > /tmp/changed.txt || git diff --name-only HEAD > /tmp/changed.txt
          # Map to plugin directories (plugins/<category>/<slug>/...)
          awk -F/ '/^plugins\// && NF>=3 {print $1"/"$2"/"$3}' /tmp/changed.txt | sort -u > /tmp/plugin-dirs.txt
          # Some plugin dirs are nested deeper (saas-packs/skill-databases/*) — handle
          awk -F/ '/^plugins\/saas-packs\/skill-databases\// && NF>=4 {print $1"/"$2"/"$3"/"$4}' /tmp/changed.txt | sort -u >> /tmp/plugin-dirs.txt
          sort -u -o /tmp/plugin-dirs.txt /tmp/plugin-dirs.txt

          echo "Changed plugin directories:"
          cat /tmp/plugin-dirs.txt || true

          # Filter to those with a package.json and @intentsolutionsio scope
          python3 <<'PY' > /tmp/packages.json
          import json, os
          dirs = [d.strip() for d in open('/tmp/plugin-dirs.txt') if d.strip()]
          out = []
          for d in dirs:
              pj = os.path.join(d, 'package.json')
              if not os.path.isfile(pj):
                  continue
              try:
                  pkg = json.load(open(pj))
              except Exception:
                  continue
              name = pkg.get('name', '')
              if not name.startswith('@intentsolutionsio/'):
                  continue
              if pkg.get('private'):
                  continue
              out.append({
                  'name': name,
                  'version': pkg.get('version', '0.0.0'),
                  'dir': d,
              })
          print(json.dumps(out))
          PY

          COUNT=$(jq length /tmp/packages.json)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "packages_json=$(jq -c . /tmp/packages.json)" >> "$GITHUB_OUTPUT"
          echo "Publish candidates: $COUNT"
          jq -r '.[] | "  \(.name)@\(.version)"' /tmp/packages.json

  publish:
    name: Publish candidates (skip if version already on npm)
    runs-on: ubuntu-latest
    needs: detect
    if: ${{ needs.detect.outputs.count != '0' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git author for tag push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish each changed package + tag + release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES_JSON: ${{ needs.detect.outputs.packages_json }}
        run: |
          set -euo pipefail
          PUBLISHED=0; SKIPPED=0; FAILED=0
          PUBLISHED_LIST=""

          # Use a process-substitution loop so subshell counters survive.
          while read -r row; do
            NAME=$(echo "$row" | jq -r '.name')
            DIR=$(echo "$row" | jq -r '.dir')
            VERSION=$(echo "$row" | jq -r '.version')
            # Tag form: `@scope/name@version` — the convention used by lerna,
            # turborepo, and changesets-managed monorepos. Distinguishable
            # from the legacy repo-wide `vN.M.O` tags.
            TAG="${NAME}@${VERSION}"

            # Does this exact version already exist on npm?
            ENC=$(echo "$NAME" | sed 's/@/%40/;s|/|%2F|')
            HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
              "https://registry.npmjs.org/$ENC/$VERSION")
            if [ "$HTTP" = "200" ]; then
              echo "⊙ skip (already published): $NAME@$VERSION"
              SKIPPED=$((SKIPPED+1))
              continue
            fi

            if ! (cd "$DIR" && npm publish --access public --provenance); then
              echo "❌ FAILED publish: $NAME@$VERSION — investigate and bump patch to retry"
              FAILED=$((FAILED+1))
              sleep 2
              continue
            fi
            echo "✓ published: $NAME@$VERSION"
            PUBLISHED=$((PUBLISHED+1))
            PUBLISHED_LIST="${PUBLISHED_LIST}\n  - ${NAME}@${VERSION}"

            # Annotated tag with body that links to npm + the source dir.
            TAG_MSG="Release ${NAME} ${VERSION}\n\nnpm: https://www.npmjs.com/package/${NAME}/v/${VERSION}\nsource: ${DIR}"
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "  ⊙ tag $TAG already exists locally; skipping tag step"
            else
              git tag -a "$TAG" -m "$(printf "%b" "$TAG_MSG")" || {
                echo "  ⚠ failed to create tag $TAG"
              }
              git push origin "refs/tags/${TAG}" || {
                echo "  ⚠ failed to push tag $TAG (network or perms)"
              }
            fi

            # GitHub Release with auto-generated notes (PR + commit summaries
            # since the previous tag for this package). `--generate-notes`
            # uses the repo's release-notes config or falls back to default.
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "  ⊙ release $TAG already exists; skipping"
            else
              # Build the notes via printf to avoid multi-line YAML literal
              # block scalar issues (blank-line-then-unindented breaks YAML
              # parsing).
              # shellcheck disable=SC2016  # backticks are literal markdown code spans
              REL_NOTES=$(printf 'Released by `publish-changed-packages.yml` on push to `main`.\n\n**npm:** https://www.npmjs.com/package/%s/v/%s\n**Source:** `%s`\n**Install:** `pnpm add %s@%s` (or `/plugin install` via Claude Code marketplace)' "$NAME" "$VERSION" "$DIR" "$NAME" "$VERSION")
              gh release create "$TAG" \
                --title "$TAG" \
                --notes "$REL_NOTES" \
                --generate-notes || {
                echo "  ⚠ failed to create GitHub release for $TAG"
              }
            fi

            sleep 2
          done < <(echo "$PACKAGES_JSON" | jq -c '.[]')

          echo ""
          echo "Summary: published=$PUBLISHED skipped=$SKIPPED failed=$FAILED"
          if [ "$PUBLISHED" -gt 0 ]; then
            echo ""
            echo "Published in this run:"
            printf '%b\n' "$PUBLISHED_LIST"
          fi
          [ "$FAILED" -eq 0 ] || exit 1
