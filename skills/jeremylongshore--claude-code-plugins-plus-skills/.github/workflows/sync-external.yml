name: Sync External Plugins

on:
  # Weekly cron — Mondays 06:00 UTC. Authors using sources.yaml get their
  # latest pulled in once a week without any human action. Re-enabled
  # 2026-05-31 after audit found 16 sources.yaml entries that never reached
  # the catalog because the prior daily cron was disabled. Weekly is a
  # cheaper cadence than daily; if it proves too slow for active authors,
  # bump to twice-weekly or back to daily.
  schedule:
    - cron: '0 6 * * 1'

  repository_dispatch:
    types: [external-plugin-sync]

  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if no changes detected'
        type: boolean
        default: false
      source:
        description: 'Sync only this source (leave empty for all)'
        type: string
        default: ''
      dry_run:
        description: 'Dry run - show what would change without making changes'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

# Serialize sync runs so a weekly cron + a repository_dispatch (or two
# dispatches) never execute concurrently. Combined with the unique per-run
# branch in the Create-PR step, this guarantees no run can clobber another's
# in-flight work. Do NOT cancel-in-progress: a half-finished sync should
# complete and open its PR rather than be killed mid-write.
concurrency:
  group: sync-external
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync from external repos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Astro requires >=22.12.0 as of 2026-05-30; sync runs
          # sync-marketplace.cjs which the build pipeline expects on 22+.
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version is read from package.json `packageManager` field
        # (specifying both `version: 9` and `packageManager` causes pnpm/action-setup
        # to error with ERR_PNPM_BAD_PM_VERSION)

      - name: Install dependencies
        # js-yaml is already in devDependencies; just install the workspace.
        # Previously this was `pnpm add js-yaml` which fails with
        # ERR_PNPM_ADDING_TO_ROOT once the repo is a real workspace.
        run: pnpm install --frozen-lockfile

      - name: Run sync script
        id: sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Injection hygiene: dispatch-controlled strings must reach the shell
          # via env vars, never via direct ${{ }} interpolation inside run:.
          # A crafted repository_dispatch client_payload.source would otherwise
          # be expanded verbatim into the script (command execution on the
          # runner). Env values arrive as data, not code.
          SYNC_SOURCE: ${{ inputs.source || github.event.client_payload.source }}
        run: |
          ARGS=()
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS+=(--force)
          fi
          # Source arrives via the SYNC_SOURCE env var (declared above) so the
          # payload is data, never script text; appended as one argv entry so
          # metacharacters / spaces stay a single argument.
          if [ -n "$SYNC_SOURCE" ]; then
            ARGS+=("--source=$SYNC_SOURCE")
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          ARGS+=(--force --verbose)

          node scripts/sync-external.mjs "${ARGS[@]}"

      # A freshly-synced source drops a new plugin dir with a .source.json
      # marker; its mirrored markdown/python must be excluded from this repo's
      # lint gates or the very next CI run red-fails on content we don't own.
      # Run the generator in WRITE mode here — right after the sync writes files
      # and BEFORE the change-detection / commit steps below — so the new
      # exclusion self-registers in .markdownlint-cli2.jsonc + ruff.toml and
      # rides along in the same auto-PR. (Skipped on dry-run and on a partial
      # sync, matching the commit/PR gating downstream.)
      - name: Sync lint-ignore exclusions
        if: inputs.dry_run != true && steps.sync.outputs.errors == '0'
        run: node scripts/sync-lint-ignores.mjs

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync marketplace catalog
        if: steps.changes.outputs.has_changes == 'true' && inputs.dry_run != true && steps.sync.outputs.errors == '0'
        # Use --no-frozen-lockfile here intentionally: the sync step above can
        # overwrite synced plugins' package.json from upstream, which legitimately
        # diverges from the committed pnpm-lock.yaml. The auto-PR this workflow
        # creates is reviewable, so allowing lockfile updates is safe.
        run: |
          pnpm install --no-frozen-lockfile
          # Full derivation, not just the CLI catalog: `pnpm run sync-marketplace`
          # also runs generate-plugin-package-jsons.mjs (a freshly-synced plugin
          # needs its package.json for the catalog-invariant gate) and
          # generate-readme-toc.mjs (the README AUTO-TOC must include the new
          # entry or the "Verify README TOC" gate fails). Running only
          # sync-marketplace.cjs skipped both and red-failed every new plugin.
          pnpm run sync-marketplace

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true' && inputs.dry_run != true && steps.sync.outputs.errors == '0'
        # Hand-rolled commit + push + PR-create instead of peter-evans/create-pull-request.
        #
        # Why: sync diffs are large (hundreds of files / 100K+ lines from upstream
        # restructures). peter-evans triggers the repo's husky pre-commit hook, which
        # runs prettier across the whole staged set and either OOMs or hangs for 15+
        # minutes. The HUSKY=0 env var doesn't reliably suppress git hooks — and
        # `git commit --no-verify` does, with no extra moving parts. Six bash lines
        # are easier to debug than a third-party action's internal commit pipeline.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Unique per-run branch. Fixes three bugs at once:
          #  - no force-push of a SHARED branch, so a concurrent/later sync run
          #    can't clobber an in-flight PR (the bug that wiped the beads-dolt PR);
          #  - the `automation/` prefix makes auto-bump-on-pr.yml skip the PR, so
          #    synced plugin versions no longer drift vs their catalog entry;
          #  - a unique name can never match an OLD merged PR, so the gh-pr-view
          #    guard below reliably opens a fresh PR instead of stranding the sync.
          BRANCH="automation/sync-external-${{ github.run_id }}"

          # Configure committer identity for the automated commit
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git switch -c "$BRANCH"

          # Stage everything the sync wrote, then commit WITHOUT running pre-commit
          # hooks (--no-verify). The auto-PR runs through normal CI on the PR side.
          git add -A
          git commit --no-verify -m "chore(sync): update external plugins from upstream

          Automated sync from external plugin sources.
          See sources.yaml for configured sources."

          git push origin "$BRANCH"

          # Open the PR. The per-run branch is unique, so this guard never matches
          # a prior PR (the old reuse bug matched an already-MERGED PR on the
          # shared branch and silently skipped creation, stranding the sync).
          if ! gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            gh pr create \
              --title "🔄 Sync external plugins" \
              --head "$BRANCH" \
              --base main \
              --label "automated,sync,external-plugins" \
              --body "## Automated External Plugin Sync

          This PR syncs the latest changes from external plugin sources.

          ### Sources
          See [\`sources.yaml\`](../blob/main/sources.yaml) for the list of synced repositories.

          ### Review Checklist
          - [ ] Changes look correct
          - [ ] No sensitive data included
          - [ ] Plugin validation passes

          ---
          *This PR was automatically created by the \`Sync External Plugins\` workflow.*"
          fi

      # A partial sync (one or more sources errored / found zero files) must NOT
      # be committed and auto-PR'd as if it were a clean full sync. The commit +
      # PR steps above are already gated on `errors == '0'`; this step makes the
      # partial run visibly RED and names the failed sources so a human can act.
      - name: Flag partial sync
        if: steps.sync.outputs.errors != '0' && steps.sync.outputs.errors != ''
        run: |
          {
            echo "## ⚠️ Partial external sync — needs human"
            echo ""
            echo "${{ steps.sync.outputs.errors }} source(s) errored; no PR was opened."
            echo "Failed: ${{ steps.sync.outputs.failed_sources }}"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error::Partial external sync (${{ steps.sync.outputs.failed_sources }}) — investigate before re-running."
          exit 1

      - name: Summary
        run: |
          echo "## 🔄 External Plugin Sync Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ Changes detected and PR created" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✓ All sources are up to date" >> "$GITHUB_STEP_SUMMARY"
          fi
