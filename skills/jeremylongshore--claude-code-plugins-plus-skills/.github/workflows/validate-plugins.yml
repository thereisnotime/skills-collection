name: Validate Plugins

on:
  workflow_dispatch:
  # Runs on every PR. The jobs below are listed in branch-protection's
  # required-status set; if a path filter here skips the run, those required
  # checks stay "Expected" forever and the PR cannot merge (the "10 Expected
  # forever" stuck-PR class — observed on PR #778). Trade-off: 5-10 extra
  # Actions minutes per PR that doesn't touch validator-relevant files.
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        # fetch-depth=2 + persist-credentials=true required for the
        # "Catalog format guard" step below — it runs `git fetch origin
        # <base_ref>` to compare against the PR's merge base. Without
        # credentials persisted, that fetch errors with "could not read
        # Username for github.com". Default actions/checkout@v6 behavior
        # depth=1 doesn't include any history to compare against either.
        with:
          fetch-depth: 2
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install root dev dependencies
        run: pnpm install --frozen-lockfile --filter "claude-code-plugins-monorepo"

      # @intentsolutions/audit-harness verify — exit 0 when policy hashes
      # match `.harness-hash`, exit 2 when a hash-pinned policy file (e.g.
      # tests/TESTING.md, .dependency-cruiser.cjs, *.feature) was changed
      # without a paired engineer-initiated `pnpm exec audit-harness init`.
      # Hashing surface is currently empty (we declined the tools that get
      # pinned — ADR-260/261/263) so this is exit 0; kept here so the gate
      # is wired the moment any pinned file lands.
      - name: Verify audit-harness integrity
        run: pnpm exec audit-harness verify

      # CI deadline enforcement — fails the build if any
      # `# REPORT-ONLY-UNTIL: YYYY-MM-DD` marker in any workflow file is
      # past its date. Forcing function: report-only gates can't rot
      # silently into permanent test bypasses.
      - name: Enforce CI deadlines (no report-only rot)
        run: python3 scripts/check-ci-deadlines.py

      # TODO(cleanup-pr-followup): These run in reporting mode (|| true) until
      # the ~5 pre-existing ESLint errors and ~36 prettier formatting deltas
      # are cleaned up in a follow-up PR. Once clean, drop the `|| true` so CI
      # blocks on style regressions. Tracking: see #582 / #584 / Phase 5 PR2.
      - name: Lint (root ESLint, reporting mode)
        run: pnpm run lint:root || true

      - name: Format check (root Prettier, reporting mode)
        run: pnpm run format:check || true

      - name: Sync CLI marketplace catalog
        run: |
          node scripts/sync-marketplace.cjs
          if ! git diff --quiet .claude-plugin/marketplace.json; then
            echo "Marketplace CLI catalog was out of date. Run: node scripts/sync-marketplace.cjs"
            git diff --stat
            exit 1
          fi

      - name: Validate catalog invariants (FS path = category)
        run: python3 scripts/validate-catalog-invariants.py

      # Unicode-hygiene gate. Detects the supply-chain attack class
      # schema validation cannot see: invisible tag characters
      # (U+E0000-U+E007F, the Socket TrapDoor vector, advisory 2026-05-24),
      # bidi overrides (Trojan Source, CVE-2021-42574), zero-width / format
      # chars in instructional text, and mixed-script identifiers in install
      # commands. Default mode blocks on BLOCKER only; --strict would also
      # block on MAJOR (deferred until the one known legit-ZWS workaround in
      # plugins/community/contributing-clanker is cleaned up separately).
      - name: Validate Unicode hygiene (Trapdoor / Trojan Source defense)
        run: python3 scripts/validate-unicode-hygiene.py

      - name: Test Unicode hygiene validator (fixture regression)
        run: python3 -m unittest tests.test_validate_unicode_hygiene -v

      # Reject PRs that reformat .claude-plugin/marketplace.extended.json beyond
      # the line budget implied by added/modified entries. Prevents prettier or
      # IDE format-on-save passes from rewriting the whole catalog and wrecking
      # merge bases for every other in-flight PR. Pulls origin/main for the
      # comparison; safe-skips on push to main (no useful base).
      - name: Catalog format guard (no whole-file reformat)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          python3 scripts/check-catalog-format.py "origin/${{ github.base_ref }}"

      - name: Verify README TOC is in sync with catalog
        run: node scripts/generate-readme-toc.mjs --check

      - name: Verify README Killer-Skill block is in sync with spotlights.json
        run: node scripts/render-spotlight.mjs --check

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          # Exclude:
          #  - tsconfig*.json (JSONC — JSON with Comments)
          #  - node_modules/**/strictest.json and similar JSONC files shipped
          #    by Astro and other transitive deps. The validate job now installs
          #    root dev dependencies (for audit-harness verify + lint:root), so
          #    node_modules/ exists at scan time and must be excluded.
          find . \
            -name "*.json" \
            -not -name "tsconfig*.json" \
            -not -path "./node_modules/*" \
            -not -path "*/node_modules/*" \
            -type f -exec sh -c '
            for file; do
              echo "Checking $file"
              if ! jq empty "$file" 2>/dev/null; then
                echo "Invalid JSON: $file"
                exit 1
              fi
            done
          ' sh {} +

      - name: Check plugin structure
        run: |
          echo "Checking plugin structure..."
          # Find all plugin directories (any directory with .claude-plugin/plugin.json)
          # -maxdepth 4 = plugins/<category>/<plugin>/.claude-plugin/plugin.json only.
          # This excludes nested sub-plugin manifests inside synced plugins like
          # tonone, where each skill subdirectory has its own plugin.json from
          # upstream. Those aren't separate marketplace plugins.
          find plugins/ -maxdepth 4 -name "plugin.json" -path "*/.claude-plugin/plugin.json" | while read plugin_json; do
            plugin=$(dirname $(dirname "$plugin_json"))
            echo "Validating $plugin"

            # Check for README
            if [ ! -f "$plugin/README.md" ]; then
              echo "Missing README.md in $plugin"
              exit 1
            fi

            # Check scripts are executable
            if [ -d "$plugin/scripts" ]; then
              find "$plugin/scripts" -type f -name "*.sh" | while read script; do
                if [ ! -x "$script" ]; then
                  echo "Script not executable: $script"
                  exit 1
                fi
              done
            fi
          done

      - name: Validate marketplace catalog
        run: |
          echo "Validating marketplace catalog..."
          jq empty .claude-plugin/marketplace.json

          # Check all plugin sources exist
          jq -r '.plugins[].source' .claude-plugin/marketplace.json | while read source; do
            if [[ "$source" == ./* ]]; then
              if [ ! -d "$source" ]; then
                echo "Plugin source not found: $source"
                exit 1
              fi
            fi
          done

      - name: Security scan - Informational sweep (non-blocking)
        # Authoritative secret scanning runs in secret-scan.yml via gitleaks
        # (every PR/push) and trufflehog (weekly verified). This step is a
        # cheap heuristic that surfaces common placeholder-shaped patterns
        # for reviewer attention. Never blocks CI — gitleaks owns blocking.
        run: |
          echo "Scanning for credential-shaped strings (informational)..."
          MATCHES=$(grep -r -E "(password|secret|api_key|token)(\s*)=(\s*)['\"]" plugins/ 2>/dev/null | \
            grep -v '= "\*\*\*"' | \
            grep -v "= '\*\*\*'" | \
            grep -v '= "xxx"' | \
            grep -v '= "XXX"' | \
            grep -v 'placeholder' | \
            grep -v 'PLACEHOLDER' | \
            grep -v 'example' | \
            grep -v 'EXAMPLE' | \
            grep -v 'your-' | \
            grep -v 'YOUR_' | \
            grep -v 'test-' | \
            grep -v 'openssl rand' | \
            grep -v 'pwgen' | \
            grep -v 'random.choice' | \
            grep -v 'secrets.choice' | \
            grep -v '\$(' | \
            grep -E "['\"][^'\"]{20,}" || true)

          if [ -n "$MATCHES" ]; then
            echo "::notice::Informational — credential-shaped strings detected. Review below and confirm gitleaks is clean."
            echo "$MATCHES"
          else
            echo "✅ No credential-shaped strings detected"
          fi

      - name: Security scan - Dangerous patterns
        run: |
          echo "Scanning for dangerous command patterns..."
          FOUND_ISSUES=0

          # Check for destructive commands (only root deletion, not /var/... paths)
          # Match: rm -rf / or rm -rf /* but NOT rm -rf /var/... etc.
          DANGEROUS_RM=$(grep -r -E "rm\s+-rf\s+/(\s|$|\*)" plugins/ 2>/dev/null | grep -v "/var/" | grep -v "/tmp/" | grep -v "/prometheus/" || true)
          if [ -n "$DANGEROUS_RM" ]; then
            echo "❌ ERROR: Dangerous 'rm -rf /' pattern detected!"
            echo "$DANGEROUS_RM"
            FOUND_ISSUES=1
          fi

          # Check for command injection risks (exclude README documentation)
          EVAL_USES=$(grep -r -E "eval\s*\(" plugins/ 2>/dev/null | grep -v "README.md" | grep -v "this.redis.eval" || true)
          if [ -n "$EVAL_USES" ]; then
            echo "⚠️  WARNING: 'eval()' detected - potential command injection risk"
            echo "$EVAL_USES"
          fi

          # Check for suspicious curl/wget to unknown domains
          if grep -r -E "curl.*http://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+" plugins/ 2>/dev/null; then
            echo "⚠️  WARNING: curl to IP address detected - potential data exfiltration"
          fi

          # Check for base64 encoded content (potential obfuscation)
          if grep -r -E "base64\s+-d" plugins/ 2>/dev/null; then
            echo "⚠️  WARNING: base64 decoding detected - potential obfuscation"
          fi

          if [ $FOUND_ISSUES -eq 0 ]; then
            echo "✅ No dangerous patterns detected"
          else
            exit 1
          fi

      - name: Security scan - Suspicious URLs
        run: |
          echo "Scanning for suspicious URLs..."
          # Check for non-HTTPS URLs (except localhost)
          if grep -r -E "http://[^l]" plugins/ | grep -v "localhost" | grep -v "127.0.0.1" 2>/dev/null; then
            echo "⚠️  WARNING: Non-HTTPS URLs detected (security risk)"
          fi

          # Check for URL shorteners (potential phishing)
          if grep -r -E "(bit\.ly|tinyurl\.com|goo\.gl)" plugins/ 2>/dev/null; then
            echo "⚠️  WARNING: URL shorteners detected (potential phishing)"
          fi

          echo "✅ URL scan complete"

      - name: Security scan - MCP plugin dependencies
        if: hashFiles('plugins/mcp/*/package.json') != ''
        run: |
          echo "Scanning MCP plugin dependencies..."
          for package in plugins/mcp/*/package.json; do
            if [ -f "$package" ]; then
              echo "Checking $package"
              dir=$(dirname "$package")
              cd "$dir"

              # Check for npm audit
              if command -v npm &> /dev/null; then
                npm audit --production || true
              fi

              cd -
            fi
          done
          echo "✅ Dependency scan complete"

  # Verification Pipeline (scoring + badge generation)
  verify:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run verification pipeline
        run: node scripts/run-verification-pipeline.mjs

      - name: Upload verification results
        uses: actions/upload-artifact@v6
        with:
          name: verification-results
          path: .claude-plugin/verification-summary.json
          retention-days: 90

  test:
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        test-type: [mcp-plugins, python-tests, validation-scripts]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        if: matrix.test-type == 'mcp-plugins'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        if: matrix.test-type == 'mcp-plugins'
        uses: pnpm/action-setup@v4

      # plugins/mcp/slack-channel uses `bun test` as its test runner.
      # Other MCP plugins use vitest. Installing bun lets the per-plugin
      # test loop run slack-channel's bun-native tests without forcing a
      # framework migration. (See issue #615.)
      - name: Setup Bun
        if: matrix.test-type == 'mcp-plugins'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: matrix.test-type == 'mcp-plugins'
        run: pnpm install --frozen-lockfile

      - name: Build MCP plugins
        if: matrix.test-type == 'mcp-plugins'
        run: |
          echo "Building MCP plugins..."
          pnpm build
          echo "✅ Build complete"

      # BLOCKING — codebase passed baseline at PR #770 (2026-05-23).
      # All 10 candidate plugins pass `pnpm test`. The original 9 failures
      # in web-to-github-issue were a mix of:
      #   - 4 stale "Use: owner/repo" error-message expectations (updated
      #     to match the improved "Must be owner/repo with valid GitHub
      #     characters" string in the implementation)
      #   - 4 verifyRepo tests expecting graceful `{exists: false, error}`
      #     return on lookup errors (implementation refactored to match
      #     — sanitization of error message preserved)
      #   - 1 parseSearchResults test expecting permissive 3-source output
      #     where URL-validation now correctly drops the no-URL entry to 2
      - name: Run plugin tests (widened loop — every package.json with a test script)
        if: matrix.test-type == 'mcp-plugins'
        run: |
          set -e
          fail=0
          tested=0
          failed_plugins=()
          for package in plugins/*/*/package.json; do
            if [ -f "$package" ]; then
              dir=$(dirname "$package")
              category=$(basename "$(dirname "$dir")")
              plugin_name=$(basename "$dir")

              # Skip SaaS packs — they're skill collections, no runtime tests.
              if [ "$category" = "saas-packs" ]; then continue; fi

              # Check if a test script exists in package.json
              if ! grep -q '"test":' "$package" && ! grep -q '"test:ci":' "$package"; then
                continue
              fi

              # Skip Python-based plugins (tested in python-tests job)
              if grep -q 'pytest' "$package"; then
                echo "⏭️  Skipping $category/$plugin_name (Python plugin, tested separately)"
                continue
              fi

              echo "Testing $category/$plugin_name..."
              cd "$dir"
              tested=$((tested + 1))

              if grep -q '"test:ci":' package.json; then
                pnpm test:ci
              else
                pnpm test -- --run
              fi
              if [ $? -ne 0 ]; then
                fail=1
                failed_plugins+=("$category/$plugin_name")
                echo "::error::$category/$plugin_name tests failed"
              else
                echo "✅ Tests passed for $category/$plugin_name"
              fi

              cd - > /dev/null
            fi
          done

          echo ""
          echo "=== test-loop summary ==="
          echo "Tested: $tested plugins (excluding SaaS packs + Python plugins)"
          if [ $fail -ne 0 ]; then
            echo "Failed: ${#failed_plugins[@]}"
            for p in "${failed_plugins[@]}"; do echo "  - $p"; done
            exit 1
          fi
          echo "All passing."

      - name: Type checking
        if: matrix.test-type == 'mcp-plugins'
        run: |
          echo "Running TypeScript type checking..."
          pnpm typecheck || exit 1
          echo "✅ Type checking passed"

      - name: Linting
        if: matrix.test-type == 'mcp-plugins'
        run: |
          echo "Running linters..."
          pnpm lint || exit 1
          echo "✅ Linting passed"

      - name: Setup Python
        if: matrix.test-type == 'python-tests'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        if: matrix.test-type == 'python-tests'
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio

          # Install dependencies if requirements.txt exists
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi

          # Install dependencies from plugin requirements.txt files
          find plugins/ -name "requirements.txt" | while read req; do
            echo "Installing deps from $req"
            pip install -r "$req" || true
          done

          # Install additional testing tools
          pip install pyyaml jsonschema

      - name: Run Python tests
        if: matrix.test-type == 'python-tests'
        run: |
          echo "Running Python tests..."

          # Find all Python test files
          TEST_FILES=$(find . -name "test_*.py" -o -name "*_test.py" | grep -v "__pycache__" | grep -v "backups/" || true)

          if [ -n "$TEST_FILES" ]; then
            echo "Found Python test files:"
            echo "$TEST_FILES"

            # Run pytest with coverage
            pytest -v --cov=. --cov-report=term-missing --cov-report=xml || exit 1
            echo "✅ Python tests passed"
          else
            echo "⚠️  No Python test files found"
          fi

      - name: Setup Python for validation
        if: matrix.test-type == 'validation-scripts'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pyyaml for validation
        if: matrix.test-type == 'validation-scripts'
        run: pip install pyyaml

      - name: Setup Node.js for validation
        if: matrix.test-type == 'validation-scripts'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm for validation
        if: matrix.test-type == 'validation-scripts'
        uses: pnpm/action-setup@v4

      - name: Build ccpi CLI
        if: matrix.test-type == 'validation-scripts'
        run: |
          cd packages/cli
          pnpm install --frozen-lockfile
          pnpm build

      - name: Run validation with universal validator
        if: matrix.test-type == 'validation-scripts'
        run: |
          echo "Testing with universal validator (v5.0)..."

          # 1. Validator smoke test: single known-good skill, standard tier — must exit 0
          echo "Running validator smoke test..."
          python3 scripts/validate-skills-schema.py --standard plugins/ai-ml/ai-ethics-validator/skills/validating-ai-ethics-and-fairness/SKILL.md || exit 1
          echo "✅ Validator runs successfully"

          # 2. Full enterprise report: surface all compliance gaps (non-blocking)
          #    Blocking enforcement deferred until batch migration of tags/compatible-with/line-limits
          echo "Running full enterprise validation (reporting mode)..."
          python3 scripts/validate-skills-schema.py --enterprise --show-low-grades || true
          echo "✅ Enterprise report complete"

          # 3. Single-skill validation test (standard tier — must pass)
          echo "Running single-skill validation..."
          python3 scripts/validate-skills-schema.py --standard plugins/ai-ml/ai-ethics-validator/skills/validating-ai-ethics-and-fairness/SKILL.md || exit 1
          echo "✅ Single-skill validation passed"

          # 4. ccpi validate backward compat
          # TEMPORARY: non-blocking until the 182 pre-existing frontmatter
          # errors are cleared. See issue #604 for full scope + reversal plan.
          # REVERT `|| true` → `|| exit 1` in the same PR that clears the
          # last frontmatter error. Do NOT leave this non-blocking any longer
          # than required to work through the cleanup campaign.
          echo "Running ccpi validate (reporting mode until frontmatter cleanup — see #604)..."
          node packages/cli/dist/index.js validate --strict || true
          echo "✅ ccpi validate complete (non-blocking)"

          echo "✅ All validation tests passed"

      - name: Upload test coverage
        if: matrix.test-type == 'python-tests' && always()
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: python
          fail_ci_if_error: false

  # Package Manager Policy Enforcement
  check-package-manager:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run package manager policy check
        run: node scripts/check-package-manager.mjs

  # Marketplace Validation Gates
  marketplace-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install marketplace dependencies
        run: |
          cd marketplace
          npm install

      - name: Build marketplace
        run: |
          cd marketplace
          npm run build

      - name: Validate Playbook Routes (source + dist)
        run: node marketplace/scripts/validate-playbook-routes.mjs --dist

      - name: Validate Internal Links (dist)
        run: node marketplace/scripts/validate-internal-links.mjs

      - name: Smoke Test - Verify Build Output
        run: |
          echo "Running smoke tests on marketplace build output..."

          # 1. Verify dist/index.html exists and is valid HTML
          if [ ! -f "marketplace/dist/index.html" ]; then
            echo "ERROR: marketplace/dist/index.html not found"
            exit 1
          fi

          if ! grep -q "<!DOCTYPE html>" marketplace/dist/index.html; then
            echo "ERROR: Missing DOCTYPE in index.html"
            exit 1
          fi

          if ! grep -q "Claude Code" marketplace/dist/index.html; then
            echo "ERROR: Missing expected content in index.html"
            exit 1
          fi

          echo "✓ index.html exists and is valid"

          # 2. Verify at least one plugin page exists
          PLUGIN_COUNT=$(find marketplace/dist/plugins -name "index.html" -type f 2>/dev/null | wc -l)
          if [ "$PLUGIN_COUNT" -lt 1 ]; then
            echo "ERROR: No plugin pages found in marketplace/dist/plugins/"
            exit 1
          fi
          echo "✓ Found $PLUGIN_COUNT plugin pages"

          # 3. Verify /explore/index.html exists
          if [ ! -f "marketplace/dist/explore/index.html" ]; then
            echo "ERROR: marketplace/dist/explore/index.html not found"
            exit 1
          fi
          echo "✓ Explore page exists"

          # 4. Verify /skills/index.html exists
          if [ ! -f "marketplace/dist/skills/index.html" ]; then
            echo "ERROR: marketplace/dist/skills/index.html not found"
            exit 1
          fi
          echo "✓ Skills page exists"

          # 5. Check max line length for iOS Safari compatibility
          MAX_LINE=$(wc -L marketplace/dist/index.html | awk '{print $1}')
          if [ "$MAX_LINE" -gt 5000 ]; then
            echo "WARNING: HTML line too long ($MAX_LINE chars). iOS Safari may fail to render."
          else
            echo "✓ HTML line length OK ($MAX_LINE chars)"
          fi

          # 6. Verify /cowork/index.html exists
          if [ ! -f "marketplace/dist/cowork/index.html" ]; then
            echo "ERROR: marketplace/dist/cowork/index.html not found"
            exit 1
          fi
          echo "✓ Cowork page exists"

          # 7. Verify downloads manifest exists
          if [ ! -f "marketplace/dist/downloads/manifest.json" ]; then
            echo "ERROR: marketplace/dist/downloads/manifest.json not found"
            exit 1
          fi
          echo "✓ Downloads manifest exists"

          # 8. Verify plugin zips generated
          PLUGIN_ZIP_COUNT=$(find marketplace/dist/downloads/plugins -name "*.zip" -type f 2>/dev/null | wc -l)
          if [ "$PLUGIN_ZIP_COUNT" -lt 1 ]; then
            echo "ERROR: No plugin zips in marketplace/dist/downloads/plugins/"
            exit 1
          fi
          echo "✓ Found $PLUGIN_ZIP_COUNT plugin zips"

          echo "✅ All smoke tests passed"

      - name: Validate Cowork Downloads
        run: node marketplace/scripts/validate-cowork-downloads.mjs

      - name: Validate Cowork Manifest Drift
        # Catalog ↔ manifest ↔ disk alignment gate. Complements
        # validate-cowork-downloads.mjs (manifest → disk presence) by also
        # walking disk → manifest (orphan detection) and catalog → manifest.
        # See CLAUDE.md § "Auto-cowork contract" for the invariant.
        run: node scripts/validate-cowork-manifest.mjs

      - name: Validate Cowork Security
        run: node scripts/validate-cowork-security.mjs

      - name: Validate routes
        run: node scripts/check-routes.mjs

      - name: Validate official links
        run: node scripts/check-official-links.mjs

      - name: Performance budget check
        run: node scripts/check-performance.mjs

  # CLI Smoke Tests (EPIC D - D3)
  cli-smoke-tests:
    runs-on: ubuntu-latest
    needs: marketplace-validation
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install CLI dependencies
        run: |
          cd packages/cli
          pnpm install --frozen-lockfile

      - name: Build CLI
        run: |
          cd packages/cli
          pnpm build

      - name: Verify bin entrypoint is executable
        run: |
          if [ ! -x packages/cli/dist/index.js ]; then
            echo "❌ CLI bin entrypoint is not executable"
            exit 1
          fi
          echo "✅ CLI bin entrypoint is executable"

      - name: Test CLI --help
        run: |
          cd packages/cli
          node dist/index.js --help
          if [ $? -eq 0 ]; then
            echo "✅ CLI --help works"
          else
            echo "❌ CLI --help failed"
            exit 1
          fi

      - name: Test CLI --version
        run: |
          cd packages/cli
          node dist/index.js --version
          if [ $? -eq 0 ]; then
            echo "✅ CLI --version works"
          else
            echo "❌ CLI --version failed"
            exit 1
          fi

      - name: Test CLI doctor command
        run: |
          cd packages/cli
          node dist/index.js doctor --help
          if [ $? -eq 0 ]; then
            echo "✅ CLI doctor --help works"
          else
            echo "❌ CLI doctor --help failed"
            exit 1
          fi

      - name: Test CLI validate command
        run: |
          cd packages/cli
          node dist/index.js validate --help
          if [ $? -eq 0 ]; then
            echo "✅ CLI validate --help works"
          else
            echo "❌ CLI validate --help failed"
            exit 1
          fi

      - name: Test CLI install command options
        run: |
          cd packages/cli
          node dist/index.js install --help
          if [ $? -eq 0 ]; then
            echo "✅ CLI install --help works"
          else
            echo "❌ CLI install --help failed"
            exit 1
          fi

      - name: Verify no workspace dependencies
        run: |
          if grep -q "workspace:" packages/cli/package.json; then
            echo "❌ CLI has workspace: dependencies - will break at runtime!"
            exit 1
          fi
          echo "✅ CLI has no workspace dependencies"

      - name: Test npm pack
        run: |
          cd packages/cli
          npm pack
          if [ $? -eq 0 ]; then
            echo "✅ npm pack works"
            ls -lh *.tgz
          else
            echo "❌ npm pack failed"
            exit 1
          fi

      # Bundle size budget (issue #591). Caps the gzipped JS shipped to npm
      # so install latency stays bounded as the CLI grows. Budget is set ~50%
      # above the current size (currently ~27 KB → 40 KB ceiling). Tighten
      # the limit in .size-limit.json after every shrink. MCP plugins are
      # intentionally excluded — they're server-side, not install-latency-bound.
      - name: Bundle size budget
        run: |
          cd packages/cli
          pnpm exec size-limit

  # ──────────────────────────────────────────────────────────────────────
  # Script-quality gates — added 2026-05-20 to close blind spots flagged
  # in the audit (post-#756). Previously CI checked plugin STRUCTURE (README,
  # SKILL.md frontmatter, catalog consistency) but didn't actually look at
  # the scripts shipped INSIDE skills. These three jobs fix that:
  #
  #   shellcheck-skills              — syntax-check + lint every .sh in plugins/
  #   skill-codeblock-syntax         — syntax-check fenced code blocks in
  #                                    SKILL.md / README.md (python, bash, js)
  #   typescript-coverage-audit      — flag TS files in plugins/ whose
  #                                    enclosing package.json doesn't define
  #                                    a `typecheck` script (so they slip
  #                                    past `pnpm --filter '*' typecheck`)
  #
  # The two markdown / TS-coverage gates run in REPORT-ONLY mode initially —
  # they print findings but exit 0. Flip to enforcing once the cleanup PR
  # lands (separate bead). See PR that added these for the rollout plan.
  # ──────────────────────────────────────────────────────────────────────

  shellcheck-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck --version | head -2

      # BLOCKING — codebase passed baseline at PR #768 (2026-05-22, 223→0).
      # .shellcheckrc at repo root governs disable= directives.
      # No `|| true` swallow: external PRs that introduce shellcheck
      # warnings or errors fail this gate.
      - name: Run shellcheck (severity=warning) across plugins/**/*.sh
        run: |
          set -e
          count=$(find plugins -name '*.sh' -not -path '*/node_modules/*' -type f | wc -l)
          echo "Shellchecking $count .sh files at severity=warning..."
          find plugins -name '*.sh' -not -path '*/node_modules/*' -type f -print0 \
            | xargs -0 shellcheck --severity=warning --shell=bash

  skill-codeblock-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Node.js (for js codeblock syntax checks)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # BLOCKING — codebase passed baseline at PR #771 (2026-05-23).
      # 5,991 of 16,298 fenced code blocks checked (only python/bash/sh/
      # javascript get syntax-checked; typescript, json, yaml, text, etc.
      # are skipped per scripts/lint-skill-codeblocks.py CHECKABLE set).
      # The 97 baseline failures were all mislabeled language tags:
      #   - 7 python blocks containing slash-commands / Datadog DSL /
      #     JSON / ASCII trees / shell — relabeled to text/json/bash
      #   - 24 javascript blocks containing Firestore Security Rules /
      #     YAML / pedagogical vulnerable+secure comparisons — relabeled
      #     to text/yaml/json
      #   - 66 bash blocks containing CLI usage with <placeholder>
      #     brackets ("python script.py <input>") — relabeled to text
      #     (these are illustrative examples, not literal runnable cmds)
      - name: Lint fenced code blocks in SKILL.md / README.md
        run: |
          python3 scripts/lint-skill-codeblocks.py --root plugins

  typescript-coverage-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # BLOCKING — codebase passed baseline at PR #769 (2026-05-23).
      # All 142 .ts files in plugins/ covered by a typecheck script in
      # their enclosing package.json. Audit script excludes **/assets/**
      # (illustrative skill-doc examples) and **/.vitepress/** (docs-site
      # config, not part of the npm package).
      - name: Audit TypeScript files for typecheck coverage
        run: |
          python3 scripts/audit-typescript-coverage.py --root plugins

  eslint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install root dev dependencies
        run: pnpm install --frozen-lockfile --filter "claude-code-plugins-monorepo"

      # BLOCKING — codebase passed baseline at PR #764 (2026-05-22).
      # No report-only crutch: external PRs that introduce eslint errors fail here.
      - name: Run eslint
        run: pnpm lint:root

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install root dev dependencies
        run: pnpm install --frozen-lockfile --filter "claude-code-plugins-monorepo"

      # BLOCKING — 5 files autofixed on PR #764 baseline (2026-05-22).
      # No report-only crutch: external PRs with formatting drift fail here.
      # Run `pnpm format` locally to fix before pushing.
      - name: Check prettier formatting
        run: pnpm format:check

  ruff-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      # BLOCKING — codebase passed baseline at PR #765 (2026-05-22, 730→0).
      # ruff.toml at repo root governs rule selection.
      # No report-only crutch: external PRs that introduce ruff errors fail here.
      - name: Run ruff check
        run: ruff check plugins/ scripts/

  ruff-format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      # BLOCKING — 374 files formatted at PR #765 baseline.
      # Run `ruff format plugins/ scripts/` locally to fix before pushing.
      - name: Check ruff formatting
        run: ruff format --check plugins/ scripts/

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # BLOCKING — codebase passed baseline at PR #772 (2026-05-23).
      # Cleanup arc: 60,000 → 80 (PR #767 bulk-fix) → 0 (this PR).
      # Final cleanup fixed:
      #   - 21 broken TOC anchors in 3 wondelai case-studies (GitHub slug
      #     mismatch with em-dash titles — regenerated link targets)
      #   - 13 more broken anchors in design + ai-ml-engineering-pack
      #   - 2 missing-section TOC entries in ai-ml USE_CASES.md
      #   - 8 MD056 table column-count: `|` chars inside backtick code
      #     spans (regex, set union) → escaped to `\|`
      #   - 4 MD056 real column mismatches (added/split header columns)
      #   - 7 MD001 heading-increment (h4 → h3 demotions)
      #   - 4 MD003 setext → atx (force-blank-line, language-tag fences,
      #     wrap YAML frontmatter examples in code fences)
      #   - 3 MD045 missing alt-text on shield badges (added alt=)
      #   - 6 MD046 indented-code-blocks in nested-list contexts and
      #     malformed-fence files (per-file MD046-disable on the 3
      #     deprecated commands/ files where fixing structurally
      #     would risk breaking the example output)
      # .markdownlint-cli2.jsonc at repo root governs rule selection.
      - name: Run markdownlint-cli2
        run: |
          npx -y markdownlint-cli2
