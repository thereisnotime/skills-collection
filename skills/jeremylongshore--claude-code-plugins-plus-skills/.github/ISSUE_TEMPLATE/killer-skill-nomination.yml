name: "Killer Skill Nomination"
description: "Nominate your skill for Killer Skill of the Week"
title: "[Killer Skill] "
labels: ["killer-skill-nomination"]
body:
  - type: markdown
    attributes:
      value: |
        ### Think your skill is killer?

        We spotlight one community skill every week on [tonsofskills.com/community](https://tonsofskills.com/community). Winners get featured on the homepage, added to the Hall of Fame, and linked from the marketplace.

        Drop your repo below. We'll review it, and if it makes the cut we'll open an issue on your repo with details + potentially submit a PR with improvements.

  - type: input
    id: repo-url
    attributes:
      label: Repo URL
      description: Link to your Claude Code skill/plugin repo
      placeholder: https://github.com/you/your-skill
    validations:
      required: true

  - type: input
    id: author-name
    attributes:
      label: Your name
      placeholder: Alex Greenshpun
    validations:
      required: true

  - type: input
    id: github-handle
    attributes:
      label: GitHub handle
      placeholder: "@alexgreensh"
    validations:
      required: true

  - type: textarea
    id: pitch
    attributes:
      label: Why is it killer?
      description: 2-3 sentences. What problem does it solve? What makes it stand out?
      placeholder: "My skill does X because Y. It's different because Z."
    validations:
      required: true

  - type: textarea
    id: quote
    attributes:
      label: Your one-liner (optional)
      description: A short quote we can feature alongside the spotlight. Think testimonial, not tagline.
      placeholder: "I built this because Claude kept eating my context window."
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - productivity
        - security
        - testing
        - devops
        - ai-ml
        - database
        - api-development
        - business-tools
        - crypto
        - saas-packs
        - skill-enhancers
        - other
    validations:
      required: true
