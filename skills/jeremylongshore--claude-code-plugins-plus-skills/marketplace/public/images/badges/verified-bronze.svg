<svg xmlns="http://www.w3.org/2000/svg" width="120" height="20" viewBox="0 0 120 20">
  <linearGradient id="bronze-bg" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="bronze-r"><rect width="120" height="20" rx="3" fill="#fff"/></clipPath>
  <g clip-path="url(#bronze-r)">
    <rect width="60" height="20" fill="#555"/>
    <rect x="60" width="60" height="20" fill="#A0522D"/>
    <rect width="120" height="20" fill="url(#bronze-bg)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,sans-serif" font-size="11">
    <text x="30" y="15" fill="#010101" fill-opacity=".3">verified</text>
    <text x="30" y="14">verified</text>
    <text x="90" y="15" fill="#010101" fill-opacity=".3">bronze</text>
    <text x="90" y="14">bronze</text>
  </g>
</svg>
