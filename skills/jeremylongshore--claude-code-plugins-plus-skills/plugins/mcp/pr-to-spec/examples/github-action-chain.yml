# github-action-chain.yml — Workflow that generates a spec and pipes it to a review step
#
# This demonstrates chaining pr-to-prompt with a downstream action or script.
# Copy this to .github/workflows/ in your repository.

name: PR Spec Review Chain
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-and-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Step 1: Generate the prompt-spec
      - name: Generate prompt-spec
        id: spec
        uses: jeremylongshore/pr-to-prompt@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_COMMENT: "false"
          INPUT_FORMAT: "json"
          INPUT_OUTPUT_DIR: .pr-to-prompt/specs

      # Step 2: Check for high-risk flags
      - name: Risk gate
        id: risk
        run: |
          SPEC_FILE=".pr-to-prompt/specs/pr-${{ github.event.pull_request.number }}.spec.json"
          RISK_COUNT=$(jq '.risk_flags | length' "$SPEC_FILE")
          HIGH_RISK=$(jq '[.risk_flags[] | select(.severity == "high")] | length' "$SPEC_FILE")

          echo "risk_count=$RISK_COUNT" >> "$GITHUB_OUTPUT"
          echo "high_risk_count=$HIGH_RISK" >> "$GITHUB_OUTPUT"

          if [ "$HIGH_RISK" -gt 0 ]; then
            echo "::warning::High-risk changes detected ($HIGH_RISK flags)"
            echo "needs_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_review=false" >> "$GITHUB_OUTPUT"
          fi

      # Step 3: Upload spec as artifact (always)
      - name: Upload spec artifact
        uses: actions/upload-artifact@v4
        with:
          name: prompt-spec-pr-${{ github.event.pull_request.number }}
          path: .pr-to-prompt/specs/

      # Step 4: Post risk summary comment (only for risky PRs)
      - name: Post risk comment
        if: steps.risk.outputs.needs_review == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const specFile = `.pr-to-prompt/specs/pr-${context.payload.pull_request.number}.spec.json`;
            const spec = JSON.parse(fs.readFileSync(specFile, 'utf8'));

            const highRisks = spec.risk_flags
              .filter(r => r.severity === 'high')
              .map(r => `- **${r.category}**: ${r.description}`)
              .join('\n');

            const body = `## High-Risk Changes Detected

            This PR has been flagged for additional review.

            ### Risk Flags
            ${highRisks}

            ### Recommended Actions
            - [ ] Domain expert review required
            - [ ] Security review for flagged categories
            - [ ] Verify no regressions in affected areas

            ---
            *Generated by [pr-to-prompt](https://github.com/jeremylongshore/pr-to-prompt)*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      # Step 5: Block merge on high-risk (optional — uncomment to enforce)
      # - name: Enforce risk gate
      #   if: steps.risk.outputs.needs_review == 'true'
      #   run: |
      #     echo "::error::High-risk PR requires manual approval before merge"
      #     exit 1
