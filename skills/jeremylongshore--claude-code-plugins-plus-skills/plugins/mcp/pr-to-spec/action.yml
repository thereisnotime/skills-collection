name: "PR to Spec"
description: "Convert GitHub PRs into structured, agent-consumable spec artifacts"
author: "Jeremy Longshore"

branding:
  icon: "file-text"
  color: "blue"

inputs:
  github_token:
    description: "GitHub token for API access"
    required: false
    default: ${{ github.token }}
  comment:
    description: "Post spec summary as a PR comment"
    required: false
    default: "true"
  output_dir:
    description: "Directory to write spec artifacts"
    required: false
    default: ".pr-to-spec/specs"
  ai_enhance:
    description: "Enhance spec with AI-generated insights (requires ai_api_key)"
    required: false
    default: "false"
  ai_provider:
    description: "AI provider: anthropic or openai"
    required: false
    default: "anthropic"
  ai_api_key:
    description: "API key for AI provider (or set ANTHROPIC_API_KEY/OPENAI_API_KEY)"
    required: false
  ai_model:
    description: "Override the default AI model"
    required: false
  format:
    description: "Output format: yaml, markdown, json, both"
    required: false
    default: "both"
  webhook_url:
    description: "URL to POST the JSON spec to when generation completes"
    required: false

outputs:
  spec_yaml_path:
    description: "Path to the generated YAML spec"
  spec_md_path:
    description: "Path to the generated Markdown summary"
  pr_number:
    description: "PR number that was analyzed"
  files_changed:
    description: "Number of files changed in the PR"
  risk_count:
    description: "Number of risk flags identified"
  spec_json_path:
    description: "Path to the generated JSON spec"

runs:
  using: "node20"
  main: "dist/action-bundle/index.js"
