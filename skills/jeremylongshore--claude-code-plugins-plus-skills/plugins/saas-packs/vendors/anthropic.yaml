# Anthropic Vendor Configuration
# Flagship+ tier - 30 skills

company: anthropic
display_name: Anthropic
tier: flagship+
primary_language: typescript

# SDK/Package info
npm_package: "@anthropic-ai/sdk"
pip_package: anthropic
client_class: Anthropic

# URLs
api_url: https://api.anthropic.com
docs_url: https://docs.anthropic.com
status_url: https://status.anthropic.com
changelog_url: https://docs.anthropic.com/en/docs/about-claude/models

# Verification code for install-auth
verification_code: "const anthropic = new Anthropic(); const msg = await anthropic.messages.create({ model: 'claude-sonnet-4-20250514', max_tokens: 10, messages: [{ role: 'user', content: 'ping' }] }); console.log(msg.content[0].text ? 'OK' : 'Failed');"

# Hello world code
hello_world_ts: |
  import Anthropic from '@anthropic-ai/sdk';
  const client = new Anthropic();
  const message = await client.messages.create({
    model: 'claude-sonnet-4-20250514',
    max_tokens: 1024,
    messages: [{ role: 'user', content: 'Hello, Claude!' }],
  });
  console.log(message.content[0].text);
hello_world_py: |
  import anthropic
  client = anthropic.Anthropic()
  message = client.messages.create(
      model="claude-sonnet-4-20250514",
      max_tokens=1024,
      messages=[{"role": "user", "content": "Hello, Claude!"}],
  )
  print(message.content[0].text)

# Core workflows (Anthropic-specific)
workflow_a_slug: messages-api-streaming
workflow_a_name: Messages API with Streaming
workflow_a_description: |
  Use the Anthropic Messages API with streaming for real-time token
  generation. Covers system prompts, multi-turn conversations, and
  server-sent events (SSE) streaming for responsive UIs.
workflow_a_trigger: streaming messages API
workflow_a_action: implement streaming message creation
workflow_a_use_case_1: Building a chat interface with real-time token streaming
workflow_a_use_case_2: Multi-turn conversation with system prompt and context management
workflow_a_use_case_3: Handling streaming events (message_start, content_block_delta, message_stop)

workflow_b_slug: tool-use-function-calling
workflow_b_name: Tool Use / Function Calling
workflow_b_description: |
  Implement Claude's tool use (function calling) capability to let
  Claude invoke external functions, APIs, or data lookups. Covers
  tool definitions, input schema validation, and tool result handling.
workflow_b_trigger: tool use function calling
workflow_b_action: define tools and handle tool_use responses
workflow_b_use_case_1: Giving Claude access to external APIs and databases
workflow_b_use_case_2: Building agentic workflows with multi-step tool chains
workflow_b_use_case_3: Structured output extraction via tool definitions

