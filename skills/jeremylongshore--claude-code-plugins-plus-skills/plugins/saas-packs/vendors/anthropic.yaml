# Error patterns
error_1_name: Overloaded Error
error_1_message: "529 overloaded_error: Anthropic's API is temporarily overloaded"
error_1_cause: High demand has exceeded Anthropic's serving capacity for the requested model
error_1_solution: "Implement exponential backoff with jitter. Use x-should-retry header. Consider falling back to a smaller model (haiku) during peak times."

error_2_name: Invalid API Key
error_2_message: "401 authentication_error: invalid x-api-key"
error_2_cause: The ANTHROPIC_API_KEY environment variable is missing, expired, or malformed
error_2_solution: "Regenerate key at console.anthropic.com/settings/keys. Ensure the key starts with 'sk-ant-'. Check environment variable is set and not quoted with extra whitespace."

error_3_name: Rate Limit Error
error_3_message: "429 rate_limit_error: Number of request tokens has exceeded your per-minute rate limit"
error_3_cause: Token usage or request count exceeded the tier's per-minute limit
error_3_solution: "Check retry-after header for wait time. Reduce max_tokens, batch requests, or request a tier upgrade at console.anthropic.com/settings/limits."

