# Sentry Vendor Configuration
# Flagship+ tier - 30 skills

company: sentry
display_name: Sentry
tier: flagship+
primary_language: typescript

# SDK/Package info
npm_package: "@sentry/node"
pip_package: sentry-sdk
client_class: Sentry

# URLs
api_url: https://sentry.io/api/0/
docs_url: https://docs.sentry.io
status_url: https://status.sentry.io
changelog_url: https://github.com/getsentry/sentry-javascript/releases

# Verification code for install-auth
verification_code: "const Sentry = require('@sentry/node'); Sentry.init({ dsn: process.env.SENTRY_DSN }); Sentry.captureMessage('test'); console.log('OK');"

# Hello world code
hello_world_ts: "import * as Sentry from '@sentry/node'; Sentry.init({ dsn: process.env.SENTRY_DSN, tracesSampleRate: 1.0 }); Sentry.captureMessage('Hello from Sentry!'); await Sentry.flush(2000);"
hello_world_py: "import sentry_sdk; sentry_sdk.init(dsn=os.environ['SENTRY_DSN'], traces_sample_rate=1.0); sentry_sdk.capture_message('Hello from Sentry!'); sentry_sdk.flush()"

# Core workflows (Sentry-specific)
workflow_a_slug: error-tracking-setup
workflow_a_name: Error Tracking Setup
workflow_a_description: |
  Initialize Sentry error tracking with source maps, environment tags,
  and release tracking. The primary workflow for integrating Sentry into
  any JavaScript/TypeScript or Python project.
workflow_a_trigger: set up error tracking
workflow_a_action: initialize Sentry SDK with source maps and releases
workflow_a_use_case_1: Adding error monitoring to a new production application
workflow_a_use_case_2: Configuring source maps for readable stack traces
workflow_a_use_case_3: Setting up release tracking for deploy correlation

workflow_b_slug: performance-monitoring
workflow_b_name: Performance Monitoring
workflow_b_description: |
  Configure Sentry Performance Monitoring with custom transactions,
  spans, and distributed tracing across services. Includes Web Vitals
  tracking for frontend applications.
workflow_b_trigger: performance monitoring
workflow_b_action: instrument transactions and distributed tracing
workflow_b_use_case_1: Tracking API endpoint latency and throughput
workflow_b_use_case_2: Monitoring Web Vitals (LCP, FID, CLS) in production
workflow_b_use_case_3: Distributed tracing across microservices

