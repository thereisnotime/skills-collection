# Error patterns
error_1_name: Invalid DSN
error_1_message: "Invalid Sentry DSN: Invalid URL"
error_1_cause: The SENTRY_DSN environment variable is missing, empty, or contains a malformed URL
error_1_solution: "Verify DSN in Sentry dashboard under Settings → Client Keys. Format: https://<key>@<org>.ingest.sentry.io/<project-id>"

error_2_name: Quota Exceeded
error_2_message: "429 Too Many Requests: event rejected due to rate limit"
error_2_cause: Project or organization has exceeded its error event quota for the billing period
error_2_solution: "Set sampleRate < 1.0, add beforeSend filter for noisy errors, or upgrade plan. Check usage in Settings → Subscription."

error_3_name: Source Maps Missing
error_3_message: "Could not fetch source map for /assets/app.js.map"
error_3_cause: Source maps not uploaded for the release, or release version mismatch between SDK and uploaded artifacts
error_3_solution: "Run 'sentry-cli releases files <release> upload-sourcemaps ./dist'. Ensure Sentry.init({ release }) matches the CLI release name."

# CLI commands
cli_deploy: "sentry-cli releases new $VERSION && sentry-cli releases set-commits $VERSION --auto"
cli_sourcemaps: "sentry-cli releases files $VERSION upload-sourcemaps ./dist --url-prefix '~/'"
cli_webhook_test: "sentry-cli send-event -m 'Test event from CLI'"

