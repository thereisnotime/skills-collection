# Figma Vendor Configuration
# Flagship+ tier - 30 skills

company: figma
display_name: Figma
tier: flagship+
primary_language: typescript

# SDK/Package info
npm_package: figma-js
pip_package: null
client_class: Figma.Client

# URLs
api_url: https://api.figma.com/v1
docs_url: https://www.figma.com/developers/api
status_url: https://status.figma.com
changelog_url: https://www.figma.com/developers/api#changelog

# Verification code for install-auth
verification_code: "const response = await fetch('https://api.figma.com/v1/me', { headers: { 'X-Figma-Token': process.env.FIGMA_ACCESS_TOKEN } }); const user = await response.json(); console.log(user.handle ? 'OK' : 'Failed');"

# Hello world code
hello_world_ts: |
  import * as Figma from 'figma-js';
  const client = Figma.Client({ personalAccessToken: process.env.FIGMA_ACCESS_TOKEN });
  const file = await client.file('FILE_KEY');
  console.log('File name:', file.data.name);
  console.log('Pages:', file.data.document.children.map(p => p.name));
hello_world_py: |
  import requests
  headers = {"X-Figma-Token": os.environ["FIGMA_ACCESS_TOKEN"]}
  response = requests.get("https://api.figma.com/v1/me", headers=headers)
  user = response.json()
  print(f"Authenticated as: {user['handle']} ({user['email']})")

# Core workflows (Figma-specific)
workflow_a_slug: file-component-export
workflow_a_name: File & Component Export
workflow_a_description: |
  Export Figma file components as SVG, PNG, or PDF. Traverse the
  document tree to locate specific frames, components, or component
  sets, then render them to image assets via the Figma Images API.
workflow_a_trigger: export components from figma
workflow_a_action: export frames and components as image assets
workflow_a_use_case_1: Automating icon library exports from a Figma component library
workflow_a_use_case_2: Generating marketing assets in multiple sizes from a single design
workflow_a_use_case_3: Syncing Figma illustrations to a codebase asset pipeline

workflow_b_slug: design-token-extraction
workflow_b_name: Design Token Extraction
workflow_b_description: |
  Extract design tokens (colors, typography, spacing, effects) from
  Figma styles and variables. Convert them into CSS custom properties,
  Tailwind config, or JSON token files for design system consumption.
workflow_b_trigger: extract design tokens
workflow_b_action: parse Figma styles and variables into code-ready tokens
workflow_b_use_case_1: Generating a CSS custom property file from Figma color styles
workflow_b_use_case_2: Syncing Figma typography scales to a Tailwind CSS config
workflow_b_use_case_3: Building a single-source-of-truth token pipeline from Figma Variables

