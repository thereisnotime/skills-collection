# Error patterns
error_1_name: File Not Found
error_1_message: "404 Not found: { \"status\": 404, \"err\": \"Not found\" }"
error_1_cause: The file key is invalid, the file was deleted, or the access token lacks permission for this file
error_1_solution: "Verify the file key from the Figma URL (figma.com/design/<FILE_KEY>/...). Ensure the token owner has at least view access to the file."

error_2_name: Rate Limited
error_2_message: "429 Rate limit exceeded: { \"status\": 429, \"err\": \"Rate limit exceeded\" }"
error_2_cause: Too many API requests in a short period; Figma enforces per-token rate limits
error_2_solution: "Implement exponential backoff. Cache file responses (they're large). Batch node IDs into single /images calls instead of individual requests."

error_3_name: Token Expired
error_3_message: "403 Forbidden: { \"status\": 403, \"err\": \"Invalid token\" }"
error_3_cause: Personal access token was revoked, expired, or is malformed
error_3_solution: "Generate a new token at figma.com/developers/api#access-tokens. For OAuth apps, refresh the access token using the refresh_token grant."

# CLI commands
cli_export: "curl -sH 'X-Figma-Token: $FIGMA_ACCESS_TOKEN' 'https://api.figma.com/v1/images/FILE_KEY?ids=NODE_IDS&format=svg'"
cli_file_info: "curl -sH 'X-Figma-Token: $FIGMA_ACCESS_TOKEN' 'https://api.figma.com/v1/files/FILE_KEY' | jq '.name, .lastModified'"
cli_webhook_test: "curl -sH 'X-Figma-Token: $FIGMA_ACCESS_TOKEN' 'https://api.figma.com/v1/me'"

