# Verification code for install-auth
verification_code: "const { Client } = require('@notionhq/client'); const notion = new Client({ auth: process.env.NOTION_TOKEN }); const me = await notion.users.me({}); console.log(me.name ? 'OK' : 'Failed');"

# Hello world code
hello_world_ts: |
  import { Client } from '@notionhq/client';
  const notion = new Client({ auth: process.env.NOTION_TOKEN });
  const response = await notion.search({ query: '', page_size: 5 });
  console.log('Accessible pages:', response.results.length);
  response.results.forEach(page => console.log('-', page.object, page.id));
hello_world_py: |
  from notion_client import Client
  notion = Client(auth=os.environ["NOTION_TOKEN"])
  response = notion.search(query="", page_size=5)
  print(f"Accessible pages: {len(response['results'])}")
  for page in response["results"]:
      print(f"  - {page['object']}: {page['id']}")

# Core workflows (Notion-specific)
workflow_a_slug: database-crud
workflow_a_name: Database CRUD Operations
workflow_a_description: |
  Create, query, update, and delete items in Notion databases. Covers
  all property types (title, rich text, select, multi-select, date,
  relation, formula, rollup), filtering, sorting, and pagination.
workflow_a_trigger: notion database operations
workflow_a_action: perform CRUD operations on Notion databases
workflow_a_use_case_1: Building a task tracker that syncs to a Notion database
workflow_a_use_case_2: Querying a Notion CRM database with complex filters
workflow_a_use_case_3: Bulk-updating database properties from external data sources

workflow_b_slug: page-content-management
