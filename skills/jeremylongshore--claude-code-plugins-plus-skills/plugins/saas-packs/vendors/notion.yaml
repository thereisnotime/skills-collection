# Error patterns
error_1_name: Object Not Found
error_1_message: "404 object_not_found: Could not find database with ID: abc123"
error_1_cause: The database or page ID is invalid, or the integration was not added to the page/database in Notion
error_1_solution: "In Notion, open the page/database → click '...' → 'Add connections' → select your integration. The integration must be explicitly shared with each page."

error_2_name: Rate Limited
error_2_message: "429 rate_limited: Rate limited - retry after 500ms"
error_2_cause: Exceeded Notion's rate limit of 3 requests per second per integration
error_2_solution: "Implement retry with exponential backoff. Notion returns a Retry-After header. Batch reads using search or database query instead of individual page GETs."

error_3_name: Validation Error
error_3_message: "400 validation_error: Title is not a property that exists on this database"
error_3_cause: The property name in the request does not match any property in the target database
error_3_solution: "Retrieve the database schema first with notion.databases.retrieve(). Property names are case-sensitive and must match exactly. Use the property ID as an alternative."

