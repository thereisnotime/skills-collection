workflow_b_action: create and update pages with block content
workflow_b_use_case_1: Auto-generating meeting notes pages with structured templates
workflow_b_use_case_2: Creating documentation pages from markdown content
workflow_b_use_case_3: Appending blocks to existing pages (logs, status updates)

