# Error patterns
error_1_name: Model Not Available
error_1_message: "404 error: No endpoints found for model 'meta-llama/llama-4-scout-17b-16e-instruct'"
error_1_cause: The requested model ID is invalid, deprecated, or temporarily unavailable from all providers
error_1_solution: "Check available models at openrouter.ai/models. Use the /api/v1/models endpoint to list current models. Model IDs use provider/model format."

error_2_name: Insufficient Credits
error_2_message: "402 error: Your credit balance is too low to make this request"
error_2_cause: Account balance is zero or below the cost of the requested completion
error_2_solution: "Add credits at openrouter.ai/credits. Check balance via GET /api/v1/auth/key. Set up auto-refill to avoid interruptions."

error_3_name: Context Length Exceeded
error_3_message: "400 error: This model's maximum context length is 128000 tokens. You requested 135420 tokens"
error_3_cause: Combined input + max_tokens exceeds the selected model's context window
error_3_solution: "Reduce input length, lower max_tokens, or switch to a model with a larger context window. Check model limits at /api/v1/models."

# CLI commands
cli_models: "curl -s https://openrouter.ai/api/v1/models -H 'Authorization: Bearer $OPENROUTER_API_KEY' | jq '.data | length'"
cli_balance: "curl -s https://openrouter.ai/api/v1/auth/key -H 'Authorization: Bearer $OPENROUTER_API_KEY' | jq '.data.usage,.data.limit'"
cli_webhook_test: "curl -s https://openrouter.ai/api/v1/chat/completions -H 'Authorization: Bearer $OPENROUTER_API_KEY' -H 'Content-Type: application/json' -d '{\"model\":\"anthropic/claude-sonnet-4-20250514\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}]}'"

