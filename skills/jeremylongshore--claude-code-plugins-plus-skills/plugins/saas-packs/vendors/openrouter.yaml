# URLs
api_url: https://openrouter.ai/api/v1
docs_url: https://openrouter.ai/docs
status_url: https://status.openrouter.ai
changelog_url: https://openrouter.ai/docs/changelog

# Verification code for install-auth
verification_code: "const response = await fetch('https://openrouter.ai/api/v1/models', { headers: { 'Authorization': `Bearer ${process.env.OPENROUTER_API_KEY}` } }); const data = await response.json(); console.log(data.data?.length > 0 ? 'OK' : 'Failed');"

# Hello world code
hello_world_ts: |
  import OpenAI from 'openai';
  const client = new OpenAI({
    baseURL: 'https://openrouter.ai/api/v1',
    apiKey: process.env.OPENROUTER_API_KEY,
  });
  const completion = await client.chat.completions.create({
    model: 'anthropic/claude-sonnet-4-20250514',
    messages: [{ role: 'user', content: 'Hello via OpenRouter!' }],
  });
  console.log(completion.choices[0].message.content);
hello_world_py: |
  from openai import OpenAI
  client = OpenAI(
      base_url="https://openrouter.ai/api/v1",
      api_key=os.environ["OPENROUTER_API_KEY"],
  )
  completion = client.chat.completions.create(
      model="anthropic/claude-sonnet-4-20250514",
      messages=[{"role": "user", "content": "Hello via OpenRouter!"}],
  )
  print(completion.choices[0].message.content)

# Core workflows (OpenRouter-specific)
workflow_a_slug: model-routing-comparison
workflow_a_name: Model Routing & Comparison
workflow_a_description: |
  Route requests across 200+ models from multiple providers using
  OpenRouter's unified API. Compare model outputs, costs, and
  latencies side-by-side for the same prompt.
workflow_a_trigger: model routing comparison
workflow_a_action: route requests to multiple models and compare outputs
workflow_a_use_case_1: A/B testing different models for quality and cost optimization
workflow_a_use_case_2: Benchmarking response quality across Claude, GPT-4, Gemini, Llama
workflow_a_use_case_3: Finding the cheapest model that meets a quality threshold

workflow_b_slug: multi-provider-fallback
workflow_b_name: Multi-Provider Fallback
workflow_b_description: |
  Configure automatic fallback chains across providers to ensure
  high availability. If the primary model is down or rate-limited,
  requests automatically route to the next provider in the chain.
workflow_b_trigger: provider fallback
workflow_b_action: configure multi-provider fallback chain
workflow_b_use_case_1: Production resilience when a single provider has an outage
workflow_b_use_case_2: Automatic failover from expensive to cheaper models during traffic spikes
workflow_b_use_case_3: Geographic routing to reduce latency for global users

