<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F0F0F;
      color: #E5E5E5;
    }

    .header {
      background: linear-gradient(135deg, #991B1B, #DC2626);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header .icon { font-size: 22px; }

    .status {
      padding: 10px 20px;
      font-size: 12px;
      color: #888;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .dot.connected { background: #22C55E; }
    .dot.disconnected { background: #EF4444; }

    .list {
      max-height: 300px;
      overflow-y: auto;
    }

    .company {
      padding: 12px 20px;
      border-bottom: 1px solid #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .company:hover {
      background: #1A1A1A;
    }

    .company-info h3 {
      font-size: 14px;
      font-weight: 600;
      color: #F5F5F5;
    }

    .company-info .reason {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .company-info .aliases {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .remove-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .remove-btn:hover {
      border-color: #EF4444;
      color: #EF4444;
      background: rgba(239, 68, 68, 0.1);
    }

    .empty {
      padding: 40px 20px;
      text-align: center;
      color: #555;
      font-size: 13px;
      line-height: 1.5;
    }

    .empty .emoji { font-size: 32px; margin-bottom: 10px; }

    .add-form {
      padding: 14px 20px;
      border-top: 1px solid #222;
      display: flex;
      gap: 8px;
    }

    .add-form input {
      flex: 1;
      background: #1A1A1A;
      border: 1px solid #333;
      color: #E5E5E5;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }

    .add-form input:focus {
      border-color: #DC2626;
    }

    .add-form input::placeholder {
      color: #555;
    }

    .add-form button {
      background: #DC2626;
      border: none;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-form button:hover {
      background: #B91C1C;
    }

    .footer {
      padding: 10px 20px;
      font-size: 11px;
      color: #444;
      text-align: center;
      border-top: 1px solid #1A1A1A;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">⛔</span>
    <h1>Boycott Filter</h1>
  </div>

  <div class="status" id="status">
    <span><span class="dot disconnected" id="status-dot"></span><span id="status-text">Checking...</span></span>
    <span id="count">0 companies</span>
  </div>

  <div class="list" id="list"></div>

  <div class="add-form">
    <input type="text" id="add-input" placeholder="Add company name...">
    <button id="add-btn">Add</button>
  </div>

  <div class="footer">
    Managed by your Claude Code agent
  </div>

  <script src="popup.js"></script>
</body>
</html>
