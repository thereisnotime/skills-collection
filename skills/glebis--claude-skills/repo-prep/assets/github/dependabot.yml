# Adjust `package-ecosystem` to match the repo (pip, npm, cargo, gomod, …).
version: 2
updates:
  - package-ecosystem: "{{ecosystem}}"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
