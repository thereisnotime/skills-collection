// ── Arrow key smooth navigation state ──
let navIndex = -1;
let navLastArrowTime = 0;   // timestamp of last arrow press
let navLastArrowKey = '';    // which arrow was last pressed
const NAV_DOUBLE_PRESS_MS = 300; // double-press detection window
let navTransitionActive = false; // true while camera is flying to entity

function navFlyToEntity(mesh, instant) {
  const pos = mesh.getWorldPosition(new THREE.Vector3());
  const dir = pos.clone().normalize();
  if (dir.length() < 0.01) dir.set(1, 0.3, 1).normalize();
  const camTarget = pos.clone().add(dir.multiplyScalar(8)).add(new THREE.Vector3(0, 2, 0));

  if (instant) {
    // Double-press: jump immediately
    camera.position.copy(camTarget);
    controls.target.copy(pos);
    navTransitionActive = false;
  } else {
    // Smooth fly using latestFly (same mechanism as latest mode)
    latestFly = {
      active: true,
      startTime: performance.now(),
      duration: 1500,
      fromPos: camera.position.clone(),
      toPos: camTarget,
      fromTarget: controls.target.clone(),
      toTarget: pos,
    };
    navTransitionActive = true;
    // Mark transition as done when flight completes (checked in animate loop)
  }

  activeTarget = mesh;
  presentCard(mesh);
  drawConn(mesh);
  kbIndex = interactables.indexOf(mesh);
}

function navArrow(delta, key) {
  const now = performance.now();
  const isDoublePress = (key === navLastArrowKey && now - navLastArrowTime < NAV_DOUBLE_PRESS_MS);
  navLastArrowTime = now;
  navLastArrowKey = key;

  if (isDoublePress) {
    // Double-press: skip smooth transition, jump to entity that is ALREADY the target
    // (navIndex was already advanced on the first press)
    const m = navEntities[navIndex];
    navFlyToEntity(m, true);
  } else {
    // Single press: advance index and start smooth transition
    navIndex = (navIndex + delta + navEntities.length) % navEntities.length;
    const m = navEntities[navIndex];
    navFlyToEntity(m, false);
  }
}

function buildStops(){
  if(flyStops.length)return;
  const add=(m,p,off)=>{const c=m.getWorldPosition(new THREE.Vector3()),d=c.clone().normalize();if(d.length()<.01)d.set(1,.3,1).normalize();flyStops.push({m,cam:c.clone().add(d.multiplyScalar(off)).add(new THREE.Vector3(0,2+Math.random()*2,0)),look:c,p});};
  godMeshes.forEach(m=>add(m,6000,10));
  crystalMeshes.forEach(m=>add(m,5500,9));
  narrativeMeshes.forEach(m=>add(m,5000,8));
  blindMeshes.forEach(m=>add(m,5500,11));
  depthMeshes.forEach(m=>add(m,5500,9));
  flyStops.push({m:floor,cam:floor.getWorldPosition(new THREE.Vector3()).clone().add(new THREE.Vector3(0,12,20)),look:floor.getWorldPosition(new THREE.Vector3()),p:7000});
}
function ease3(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function startFly(){buildStops();flyState.active=true;flyState.idx=0;flyState.phase='moving';flyBtn.classList.add('active');flyBtn.textContent='❚❚ pause';controls.enabled=false;controls.autoRotate=false;prepStop(performance.now());}
function stopFly(){flyState.active=false;flyState.phase='idle';flyBtn.classList.remove('active');flyBtn.textContent='▶ journey';controls.enabled=true;controls.autoRotate=true;}
flyBtn.addEventListener('click',()=>{flyState.active?stopFly():startFly();});
function prepStop(t){const s=flyStops[flyState.idx];flyState.cm=s.m;flyState.fp.copy(camera.position);flyState.tp.copy(s.cam);flyState.ft.copy(controls.target);flyState.tt.copy(s.look);flyState.st=t;flyState.dur=3200+Math.random()*800;flyState.phase='moving';}
function updateFly(t){
  if(!flyState.active)return;
  if(flyState.phase==='moving'){
    const p=THREE.MathUtils.clamp((t-flyState.st)/flyState.dur,0,1),e=ease3(p);
    camera.position.lerpVectors(flyState.fp,flyState.tp,e);
    controls.target.lerpVectors(flyState.ft,flyState.tt,e);
    if(p>=1){flyState.phase='pause';flyState.pause=t+flyStops[flyState.idx].p;presentCard(flyState.cm);activeTarget=flyState.cm;drawConn(flyState.cm);}
  } else if(flyState.phase==='pause'&&t>=flyState.pause){
    closeCard();flyState.idx=(flyState.idx+1)%flyStops.length;prepStop(t);
  }
}

function checkActProgression(t) {
  if (currentAct >= 4) return;
  const elapsed = sessionStart > 0 ? (t - sessionStart) / 1000 : 0;
  let newAct = currentAct;

  // Act 0→1: 60s OR 5 nodes clicked
  if (currentAct === 0 && (elapsed >= 60 || nodeClicks >= 5)) newAct = 1;
  // Act 1→2: 120s OR 10 nodes clicked
  if (currentAct === 1 && (elapsed >= 120 || nodeClicks >= 10)) newAct = 2;
  // Act 2→3: 180s OR 2 crystals cracked
  if (currentAct === 2 && (elapsed >= 180 || getCrackedCrystalCount() >= 2)) newAct = 3;
  // Act 3→4: 240s OR 1 blind spot revealed
  if (currentAct === 3 && (elapsed >= 240 || getRevealedBlindCount() >= 1)) newAct = 4;

  if (newAct !== currentAct) {
    currentAct = newAct;
    depthFloor = ACT_LAYERS[currentAct].floor;

    whisperEl.textContent = ACT_LAYERS[currentAct].whisper;

  if(!idleActive && t - lastInteraction > IDLE_TIMEOUT && lastInteraction > 0) {
    idleActive = true; idlePhase = 0; idleT = t;
    controls.autoRotate = true; controls.autoRotateSpeed = 0.2;
    closeCard(); clearConn();
  }
  if(!idleActive) return;

  const elapsed = (t - idleT) / 1000;
  const cycle = elapsed % 240; // 4-min cycle

  if(cycle < 45) {
    // Chapter 1: slow rise from depth
    controls.autoRotateSpeed = 0.15;
    const targetY = -20 + (cycle/45) * 35;
    camera.position.y += (targetY - camera.position.y) * 0.005;
  } else if(cycle < 120) {
    // Chapter 2: orbit at mid-level, gods announce
    controls.autoRotateSpeed = 0.25;
    camera.position.y += (5 - camera.position.y) * 0.003;
    // Briefly highlight a god every 15s
    const godIdx = Math.floor((cycle-45)/15) % godMeshes.length;
    godMeshes.forEach((m,i) => { m.material.opacity = i===godIdx ? 0.8 : 0.5; });
  } else if(cycle < 210) {
    // Chapter 3: slow descent, surface secrets
    controls.autoRotateSpeed = 0.12;
    const targetY = 5 - ((cycle-120)/90) * 25;
    camera.position.y += (targetY - camera.position.y) * 0.003;
    // Show a random secret connection briefly
    if(Math.floor(cycle)%20===0 && connGroup.children.length===0) {
      const s = SECRETS[Math.floor(Math.random()*SECRETS.length)];
      const m = meshIndex.get(s.trigger[0]);
      if(m) drawConn(m);
      setTimeout(clearConn, 8000);
    }
  } else {
    // Chapter 4: return to stillness
    controls.autoRotateSpeed = 0.08;
    camera.position.y += (15 - camera.position.y) * 0.005;
    godMeshes.forEach(m => { m.material.opacity = 0.6; });
  }
}

// ANIMATION
// ─────────────────────────────────────────
const clock=new THREE.Clock();
const breathEl=document.getElementById('breath');
const layerLabel=document.getElementById('layer-label');
const depthDot=document.getElementById('depth-dot');
const discEl=document.getElementById('discovery');

const _godWorldPos = new THREE.Vector3();
function animate(){
  requestAnimationFrame(animate);
  const t=performance.now(),dt=clock.getDelta(),b=getB(t);
  breathU.value=b; timeU.value=t*.001;

  breathEl.style.transform=`scale(${.6+b*.8})`;
  breathEl.style.background=`rgba(232,93,4,${.08+b*.12})`;

  // Progressive revelation: check act transitions and enforce depth floor
  checkActProgression(t);
  if (!idleActive && !flyState.active && camera.position.y < depthFloor) {
    camera.position.y += (depthFloor - camera.position.y) * 0.03;
  }

  const cy=camera.position.y;
  depthDot.style.top=`${(1-THREE.MathUtils.clamp((cy+22)/40,0,1))*100}%`;

  let cl='';
  for(const l of LAYERS)if(cy>=l.y-l.h/2&&cy<=l.y+l.h/2){cl=l.name;break;}
  layerLabel.textContent=cl||'';
  layerLabel.style.color=cl?'rgba(255,214,10,0.6)':'rgba(255,214,10,0)';

  // Particles — organic noise-driven flow (biological substrate)
  const tSlow = t * 0.00008; // very slow time for noise field drift
  const tMed = t * 0.0003;
  const pa=surfGeo.attributes.position.array;
  for(let i=0;i<surfN;i++){
    const v=sv[i];
    const x=pa[i*3], y=pa[i*3+1], z=pa[i*3+2];
    // 3D noise field drives velocity — like cytoplasmic streaming
    const nx = simplex3(x*0.06+tSlow, y*0.06, z*0.06+tSlow*0.7);
    const ny = simplex3(x*0.06+100, y*0.06+tSlow*0.5, z*0.06+100);
    const nz = simplex3(x*0.06+200, y*0.06+200, z*0.06+tSlow*0.9);
    // Blend noise into velocity (organic drift)
    v.vx = v.vx*0.92 + nx*0.004;
    v.vy = v.vy*0.92 + ny*0.002 + (b-0.5)*0.003; // breathing lifts/lowers
    v.vz = v.vz*0.92 + nz*0.004;
    pa[i*3]+=v.vx; pa[i*3+1]+=v.vy; pa[i*3+2]+=v.vz;
    // Soft containment (membrane, not wall)
    const d2=Math.sqrt(x*x+z*z);
    if(d2>18){const pushBack=0.98+0.02*(18/d2);pa[i*3]*=pushBack;pa[i*3+2]*=pushBack;}
    if(pa[i*3+1]>28)pa[i*3+1]=8; if(pa[i*3+1]<7)pa[i*3+1]=28;
  }
  surfGeo.attributes.position.needsUpdate=true;

  // Gods — organic breathing + noise-driven drift
  godMeshes.forEach((m,gi)=>{
    const bf = m.userData.breathFreq || 0.0018;
    const breathScale = 0.95 + 0.1 * (0.5 + 0.5 * Math.sin(t * bf));
    m.scale.setScalar(breathScale);
    // Noise-modulated rotation (not constant speed)
    const rotNoise = simplex3(gi*10, tSlow*8, 0);
    m.rotation.y += 0.0008 + rotNoise * 0.0005;
    m.rotation.x = simplex3(gi*10+50, tSlow*6, 0) * 0.08;
    // Subtle position drift (gods sway like deep-sea organisms)
    if(m.userData.homePos){
      const hp=m.userData.homePos;
      const dx = simplex3(hp.x*0.1+tSlow*3, hp.y*0.1, hp.z*0.1) * 0.8;
      const dy = simplex3(hp.x*0.1, hp.y*0.1+tSlow*2, hp.z*0.1) * 0.4;
      const dz = simplex3(hp.x*0.1, hp.y*0.1, hp.z*0.1+tSlow*3) * 0.8;
      if(gravityStrength===0){
        m.position.x = hp.x + dx;
        m.position.y = hp.y + dy;
        m.position.z = hp.z + dz;
      }
    }
  });

  // Lesser deities — gentle orbit and breathing
  demigodMeshes.forEach((m, i) => {
    const bf = m.userData.breathFreq || 0.002;
    m.scale.setScalar(0.95 + 0.1 * (0.5 + 0.5 * Math.sin(t * bf)));
    m.rotation.y += 0.0006 + simplex3(i * 15, tSlow * 6, 0) * 0.0003;
    m.rotation.x = simplex3(i * 15 + 50, tSlow * 4, 0) * 0.06;
  });

  // God orbiting particles
  godParticleSystems.forEach(sys => {
    const godPos = sys.godMesh.getWorldPosition(_godWorldPos);
    const tSec = t * 0.001;
    const arr = sys.mesh.geometry.attributes.position.array;

    for (let p = 0; p < sys.pCount; p++) {
      const o = sys.orbits[p];
      // Advance phase with precession
      o.phase += o.speed * 0.016; // ~per-frame at 60fps
      o.precession += 0.00001;

      let localX, localY, localZ;

      if (sys.godKey === 'NF-\u03BAB') {
        // The Spiral: radius oscillates inward/outward over time
        const spiralT = Math.sin(tSec * 0.3 + p * 0.1) * 0.5 + 0.5; // 0-1
        const radiusMod = 0.3 + spiralT * 0.7; // shrink to 30%, expand to 100%
        localX = Math.cos(o.phase + o.precession) * o.semiA * radiusMod;
        localZ = Math.sin(o.phase + o.precession) * o.semiB * radiusMod;
        localY = o.yOff + Math.sin(o.phase * 0.5) * 1.5;
      } else {
        // Standard elliptical orbit
        localX = Math.cos(o.phase + o.precession) * o.semiA;
        localZ = Math.sin(o.phase + o.precession) * o.semiB;
        localY = o.yOff + Math.sin(o.phase * 0.7) * 0.8;
      }

      // Apply per-god tilt to orbit plane
      const tiltedY = localY * Math.cos(sys.tiltX) - localZ * Math.sin(sys.tiltX);
      const tiltedZ = localY * Math.sin(sys.tiltX) + localZ * Math.cos(sys.tiltX);
      const finalX = localX * Math.cos(sys.tiltZ) - tiltedY * Math.sin(sys.tiltZ);
      const finalY = localX * Math.sin(sys.tiltZ) + tiltedY * Math.cos(sys.tiltZ);

      if (sys.isTrail) {
        // The Painter: line segments — current pos and a trailing pos
        const idx = p * 6;
        arr[idx]     = godPos.x + finalX;
        arr[idx + 1] = godPos.y + finalY;
        arr[idx + 2] = godPos.z + tiltedZ;
        // Trail point: slightly behind in phase
        const trailPhase = o.phase - 0.15;
        const tX = Math.cos(trailPhase + o.precession) * o.semiA;
        const tZ2 = Math.sin(trailPhase + o.precession) * o.semiB;
        const tY = o.yOff + Math.sin(trailPhase * 0.7) * 0.8;
        const ttY = tY * Math.cos(sys.tiltX) - tZ2 * Math.sin(sys.tiltX);
        const ttZ = tY * Math.sin(sys.tiltX) + tZ2 * Math.cos(sys.tiltX);
        const tfX = tX * Math.cos(sys.tiltZ) - ttY * Math.sin(sys.tiltZ);
        const tfY = tX * Math.sin(sys.tiltZ) + ttY * Math.cos(sys.tiltZ);
        arr[idx + 3] = godPos.x + tfX;
        arr[idx + 4] = godPos.y + tfY;
        arr[idx + 5] = godPos.z + ttZ;
      } else {
        const idx = p * 3;
        arr[idx]     = godPos.x + finalX;
        arr[idx + 1] = godPos.y + finalY;
        arr[idx + 2] = godPos.z + tiltedZ;
      }
    }
    sys.mesh.geometry.attributes.position.needsUpdate = true;
  });

  // Research orbs — noise-modulated orbits (not perfect circles)
  interactables.forEach(m=>{
    if(m.userData.type==='research'){
      const o=m.userData.orbit;
      // Noise-modulated speed (some moments faster, some slower — like peristalsis)
      const speedNoise = simplex3(o.a*2, tSlow*12, 0);
      o.a += (o.s*16) * (0.6 + speedNoise * 0.8);
      // Noise-modulated radius (orbit breathes)
      const rNoise = simplex3(o.a, tSlow*5, 50);
      const r = o.r + rNoise * 2;
      m.position.x=Math.cos(o.a)*r;
      m.position.z=Math.sin(o.a)*r;
      // Vertical drift with noise
      const yNoise = simplex3(o.a+100, tSlow*8, 100);
      m.position.y=o.y + yNoise*1.5 + (b-0.5)*0.3;
    }
  });

  // Filter opacity transitions
  interactables.forEach(m => {
    if(m.userData.targetOpacity!==undefined){
      const curr=m.material.opacity;
      const tgt=m.userData.targetOpacity;
      if(Math.abs(curr-tgt)>0.001) m.material.opacity+=(tgt-curr)*0.04;
    }
  });

  // Crystals
  crystalMeshes.forEach(m=>{m.rotation.y+=.002;m.rotation.x=Math.sin(t*.0003)*.1;if(m.userData.cracked){const e=(t-m.userData.crackT)/1000;m.scale.setScalar(1+Math.sin(e*2)*.05*Math.max(0,1-e*.2));m.material.color.lerp(new THREE.Color(0xffd60a),.001);}});

  // Narratives — slow rotation, pulse for stressed/intensifying
  narrativeMeshes.forEach((m,ni)=>{m.rotation.y+=.003;m.rotation.z=Math.sin(t*.0004+ni)*.08;if(m.userData.pulse){m.material.opacity=m.userData.baseOpacity+Math.sin(t*.002+ni*1.5)*.1;}});

  // Depths — slow rotation, breathing scale, shadow nodes low opacity
  depthMeshes.forEach((m,di)=>{
    m.rotation.y+=.0015;m.rotation.x=Math.sin(t*.0003+di*0.7)*.06;
    const breath=0.95+0.08*Math.sin(t*.0012+di*1.1);
    m.scale.setScalar(breath);
    if(m.userData.isShadow){
      const isHovered=m===activeTarget;
      const targetOp=isHovered?0.45:0.15;
      m.material.opacity+=(targetOp-m.material.opacity)*0.05;
    }
  });

  // Spirits — noise-driven wandering (patterns that can't settle)
  spiritMeshes.forEach((m,si)=>{
    const o=m.userData.orbit;
    const sNoise = simplex3(si*20, tSlow*10, 0);
    o.angle += (o.speed*8) * (0.5 + sNoise * 1.0);
    const rNoise = simplex3(si*20+100, tSlow*7, 0);
    m.position.x = Math.cos(o.angle) * (o.r + rNoise*3);
    m.position.z = Math.sin(o.angle) * (o.r + rNoise*3);
    m.position.y = o.baseY + simplex3(si*20, tSlow*6, 200)*3 + (b-0.5)*0.5;
    m.rotation.x += 0.002 + sNoise*0.002;
    m.rotation.z += 0.001 + rNoise*0.001;
    m.material.opacity = 0.12 + simplex3(si*20+300, tSlow*15, 0)*0.1;
  });

  // Growth items — organic grow-in animation
  growthMeshes.forEach(m => {
    const ud = m.userData;
    const age = (t - ud.birthTime) / 1000; // seconds since birth
    if (age < 0) return; // not born yet

    if (!ud.grown && age < 4) {
      // Phase 1: grow in over 4 seconds (ease-out cubic)
      const p = Math.min(age / 4, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      const s = ease * (0.8 + simplex3(m.position.x, t * 0.0001, 0) * 0.2);
      m.scale.setScalar(s);
      m.material.opacity = ease * ud.targetOpacity;
      if (ud.labelSprite) ud.labelSprite.material.opacity = ease * 0.8;
      if (ud.glowSprite) ud.glowSprite.material.opacity = ease * 0.3;
    } else {
      ud.grown = true;
      // Phase 2: alive — gentle organic pulsing
      const pulse = 1 + simplex3(m.position.x * 0.5, t * 0.0002, m.position.z * 0.5) * 0.08;
      m.scale.setScalar(pulse);
      m.material.opacity = ud.targetOpacity + simplex3(m.position.x, t * 0.0003, 0) * 0.1;
      // Slow organic drift
      if (ud.homePos) {
        const drift = simplex3(ud.homePos.x * 0.3, t * 0.00005, ud.homePos.z * 0.3) * 0.5;
        m.position.x = ud.homePos.x + drift;
        m.position.z = ud.homePos.z + simplex3(ud.homePos.z * 0.3, t * 0.00005, 0) * 0.5;
      }
      // Slow rotation
      m.rotation.x += 0.001;
      m.rotation.y += 0.0015;
    }
  });

  // Growth tendrils — fade in with their growth items
  growthTendrils.forEach(gt => {
    const ud = gt.growthMesh.userData;
    const age = (t - ud.birthTime) / 1000;
    if (age < 0) { gt.mesh.material.opacity = 0; return; }
    const fadeIn = Math.min(age / 5, 1); // slightly slower than the node
    gt.mesh.material.opacity = fadeIn * gt.targetOpacity;
  });

  // Fireflies — erratic biological drift (like actual fireflies)
  qMeshes.forEach((m,qi)=>{
    const o=m.userData.orbit;
    // Noise-modulated speed bursts (rest → sudden move → rest)
    const burstNoise = simplex3(qi*30, tSlow*20, 0);
    const speedMult = burstNoise > 0.3 ? 2.5 : (burstNoise < -0.3 ? 0.2 : 1.0);
    o.aH += o.sH*16*speedMult;
    o.aV += o.sV*16*speedMult;
    const rNoise = simplex3(qi*30+50, tSlow*8, 0);
    m.position.x = Math.cos(o.aH) * (o.r + rNoise*3);
    m.position.z = Math.sin(o.aH) * (o.r + rNoise*3);
    m.position.y = o.y + Math.sin(o.aV)*5 + simplex3(qi*30+100, tSlow*12, 0)*2;
    // Bioluminescent flicker
    const flicker = simplex3(qi*30+200, tSlow*40, 0);
    m.material.opacity = 0.3 + flicker*0.35;
  });

  // Canopy breathing — branches sway with noise
  canopyGroup.children.forEach((m, i) => {
    if (m.isMesh && m.geometry.type === 'TubeGeometry') {
      m.rotation.y = simplex3(i * 5, t * 0.00004, 0) * 0.03;
      m.rotation.x = simplex3(i * 5 + 100, t * 0.00003, 0) * 0.02;
    }
  });

  // Energy fields — slow drift and rotation
  fieldMeshes.forEach((m, i) => {
    m.rotation.y += 0.0003 + i * 0.0001;
    m.rotation.x = Math.sin(t * 0.00008 + i) * 0.1;
    const home = FIELDS[i];
    m.position.x = home.x + simplex3(i * 20, t * 0.00003, 0) * 2;
    m.position.z = home.z + simplex3(0, i * 20, t * 0.00003) * 2;
    m.position.y = home.y + simplex3(i * 20, 0, t * 0.00003) * 1.5;
  });

  pLight.intensity=.3+b*.3;

  updateAudio(t, cy, b);
  updateConnections(t);
  updateLightBeams(t);
  updateFly(t);
  // Latest mode camera transition
  if (latestFly && latestFly.active) {
    const p = Math.min((performance.now() - latestFly.startTime) / latestFly.duration, 1);
    const e = ease3(p);
    camera.position.lerpVectors(latestFly.fromPos, latestFly.toPos, e);
    controls.target.lerpVectors(latestFly.fromTarget, latestFly.toTarget, e);
    if (p >= 1) { latestFly.active = false; navTransitionActive = false; }
  }
  updateIdle(t);
  updateFloorDarkness(t);
  updateWhisper(t, cy);

  // Gravity waves from double-click
  if (window.gravityWaves) {
    for (let wi = window.gravityWaves.length - 1; wi >= 0; wi--) {
      const wave = window.gravityWaves[wi];
      const elapsed = (t - wave.startTime) / wave.duration;
      if (elapsed > 1) { window.gravityWaves.splice(wi, 1); continue; }
      // Pull then release: peaks at 0.3, fades by 1.0
      const pull = elapsed < 0.3 ? elapsed / 0.3 : Math.max(0, 1 - (elapsed - 0.3) / 0.7);
      const strength = pull * 0.15;
      interactables.forEach(m => {
        if (!m.userData.homePos) return;
        const dx = wave.center.x - m.position.x;
        const dz = wave.center.z - m.position.z;
        const dy = wave.center.y - m.position.y;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        if (dist > 0.5) {
          m.position.x += dx / dist * strength;
          m.position.y += dy / dist * strength * 0.3;
          m.position.z += dz / dist * strength;
        }
      });
      // Also add noise twitch to all entities
      const twitch = pull * 0.4;
      interactables.forEach(m => {
        m.position.x += simplex3(m.position.x + t * 0.01, 0, 0) * twitch;
        m.position.z += simplex3(0, m.position.z + t * 0.01, 0) * twitch;
      });
    }
  }

  // Gravity attractor
  if(gravityActive && activeTarget){
    gravityStrength=Math.min(gravityStrength+0.015,0.7);
  } else {
    gravityStrength=Math.max(gravityStrength-0.02,0);
  }
  if(gravityStrength>0 && activeTarget){
    const center=activeTarget.getWorldPosition(_gravLerpTarget);
    const connections=connMap.get(activeTarget.userData.key)||new Set();
    interactables.forEach(m=>{
      if(m===activeTarget||!m.userData.homePos)return;
      if(m.userData.orbit) return; // skip orbiting entities
      const weight=connections.has(m.userData.key)?1.0:0.15;
      const pull=gravityStrength*weight;
      const target=new THREE.Vector3().lerpVectors(m.userData.homePos,center,pull*0.6);
      m.position.lerp(target,0.03);
    });
  } else if(gravityStrength===0){
    interactables.forEach(m=>{
      if(m.userData.orbit) return; // skip orbiting entities
      if(m.userData.homePos) m.position.lerp(m.userData.homePos,0.02);
    });
  }

  discEl.textContent = secretsFound.size > 0 ? `${secretsFound.size} of 20` : '';

  // Hand tracking
  if (handTrackingActive) processHandFrame(t);

  controls.update();
  composer.render();
}

// ─────────────────────────────────────────
// HAND TRACKING (MediaPipe HandLandmarker)
// ─────────────────────────────────────────
let handTrackingActive = false;
let handLandmarker = null;
let handVideo = null;
let lastHandCentroid = null;
let handSmoothed = { x: 0, y: 0, area: 0 };
const HAND_SMOOTH = 0.15; // smoothing factor
const HAND_DEAD_ZONE = 0.02; // 2% of frame = dead zone
let handStableFrames = 0;
const HAND_STABILITY_THRESHOLD = 12; // frames before gesture fires

async function initHandTracking() {
  try {
    // Dynamic import of MediaPipe
    const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs');
    const { HandLandmarker, FilesetResolver } = vision;

    const wasmFiles = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm'
    );

    handLandmarker = await HandLandmarker.createFromOptions(wasmFiles, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task',
        delegate: 'GPU'
      },
      runningMode: 'VIDEO',
      numHands: 2,
      minHandDetectionConfidence: 0.5,
      minHandPresenceConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });

    handVideo = document.getElementById('handCam');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' }
    });
    handVideo.srcObject = stream;
    handVideo.style.display = 'block';
    document.getElementById('handStatus').style.display = 'block';

    console.log('Hand tracking initialized');
    return true;
  } catch (e) {
    console.error('Hand tracking failed:', e);
    return false;
  }
}

function processHandFrame(timestamp) {
  if (!handLandmarker || !handVideo || handVideo.readyState < 2) return;

  const results = handLandmarker.detectForVideo(handVideo, timestamp);

  if (!results.landmarks || results.landmarks.length === 0) {
    handStableFrames = 0;
    lastHandCentroid = null;
    document.getElementById('handStatus').textContent = 'SCANNING';
    document.getElementById('handStatus').style.color = 'rgba(232,93,4,0.3)';
    // After 3 seconds of no hands, re-enable auto-rotate
    return;
  }

  document.getElementById('handStatus').textContent = 'TRACKING';
  document.getElementById('handStatus').style.color = 'rgba(46,196,182,0.5)';

  // Use first hand's landmarks
  const landmarks = results.landmarks[0];

  // Calculate centroid (average of all 21 landmarks)
  let cx = 0, cy = 0;
  let minX = 1, maxX = 0, minY = 1, maxY = 0;
  for (const lm of landmarks) {
    cx += lm.x; cy += lm.y;
    minX = Math.min(minX, lm.x); maxX = Math.max(maxX, lm.x);
    minY = Math.min(minY, lm.y); maxY = Math.max(maxY, lm.y);
  }
  cx /= landmarks.length;
  cy /= landmarks.length;
  const area = (maxX - minX) * (maxY - minY);

  // Mirror X (camera is mirrored)
  cx = 1 - cx;

  // Smooth
  handSmoothed.x += (cx - handSmoothed.x) * HAND_SMOOTH;
  handSmoothed.y += (cy - handSmoothed.y) * HAND_SMOOTH;
  handSmoothed.area += (area - handSmoothed.area) * HAND_SMOOTH;

  handStableFrames++;
  if (handStableFrames < HAND_STABILITY_THRESHOLD) return;

  if (lastHandCentroid) {
    const dx = handSmoothed.x - lastHandCentroid.x;
    const dy = handSmoothed.y - lastHandCentroid.y;
    const dArea = handSmoothed.area - lastHandCentroid.area;

    // Orbit: horizontal sweep
    if (Math.abs(dx) > HAND_DEAD_ZONE) {
      const azimuth = controls.getAzimuthalAngle();
      const newAzimuth = azimuth - dx * 3.0; // sensitivity
      const spherical = new THREE.Spherical().setFromVector3(
        camera.position.clone().sub(controls.target)
      );
      spherical.theta = newAzimuth;
      camera.position.copy(controls.target).add(
        new THREE.Vector3().setFromSpherical(spherical)
      );
    }

    // Elevation: vertical sweep
    if (Math.abs(dy) > HAND_DEAD_ZONE) {
      const spherical = new THREE.Spherical().setFromVector3(
        camera.position.clone().sub(controls.target)
      );
      spherical.phi = THREE.MathUtils.clamp(
        spherical.phi + dy * 2.0,
        controls.minPolarAngle,
        controls.maxPolarAngle
      );
      camera.position.copy(controls.target).add(
        new THREE.Vector3().setFromSpherical(spherical)
      );
    }

    // Zoom: hand area change
    if (Math.abs(dArea) > 0.002) {
      const dist = camera.position.distanceTo(controls.target);
      const newDist = THREE.MathUtils.clamp(
        dist - dArea * 200,
        controls.minDistance,
        controls.maxDistance
      );
      const dir = camera.position.clone().sub(controls.target).normalize();
      camera.position.copy(controls.target).add(dir.multiplyScalar(newDist));
    }
  }

  lastHandCentroid = { x: handSmoothed.x, y: handSmoothed.y, area: handSmoothed.area };
}

// Audio mute toggle
let audioMuted = false;
document.getElementById('audioBtn').addEventListener('click', () => {
  audioMuted = !audioMuted;
  if (audioCtx) {
    audioN.mg.gain.linearRampToValueAtTime(audioMuted ? 0 : 0.08, audioCtx.currentTime + 1);
  }
  const btn = document.getElementById('audioBtn');
  btn.textContent = audioMuted ? 'UNMUTE' : 'AUDIO';
  btn.classList.toggle('active', audioMuted);
});

// Toggle button
document.getElementById('handBtn').addEventListener('click', async () => {
  if (!handTrackingActive) {
    const ok = await initHandTracking();
    if (ok) {
      handTrackingActive = true;
      document.getElementById('handBtn').classList.add('active');
      controls.autoRotate = false;
    }
  } else {
    handTrackingActive = false;
    document.getElementById('handBtn').classList.remove('active');
    if (handVideo && handVideo.srcObject) {
      handVideo.srcObject.getTracks().forEach(t => t.stop());
      handVideo.style.display = 'none';
    }
    document.getElementById('handStatus').style.display = 'none';
    controls.autoRotate = true;
  }
});

// ─────────────────────────────────────────
// INTRO
// ─────────────────────────────────────────
document.getElementById('enterBtn').addEventListener('click',()=>{
  const intro=document.getElementById('intro');
  intro.classList.add('out');
  controls.enabled=true;
  sessionStart=performance.now();
  initAudio();
  const s={x:3,y:-5,z:3},e={x:22,y:8,z:22};
  camera.position.set(s.x,s.y,s.z);controls.target.set(0,-5,0);
  const dur=5000,st=performance.now();
  (function ia(t){const p=Math.min((t-st)/dur,1),ease=p*p*(3-2*p);camera.position.set(s.x+(e.x-s.x)*ease,s.y+(e.y-s.y)*ease,s.z+(e.z-s.z)*ease);if(p<1)requestAnimationFrame(ia);})(st);
  setTimeout(()=>intro.remove(),4000);
  // Starting point: dim everything, spotlight first god
  setTimeout(() => {
    interactables.forEach(m => {
      if (!m.userData.baseOpacity) m.userData.baseOpacity = m.material.opacity;
      m.material.opacity = 0.03;
    });
    godMeshes[0].material.opacity = 0.7;
    // Fade in after 3 seconds
    setTimeout(() => {
      let fadeStart = performance.now();
      function fadeIn(t) {
        const p = Math.min((t - fadeStart) / 2000, 1);
        interactables.forEach(m => {
          const base = m.userData.baseOpacity || 0.5;
          m.material.opacity = 0.03 + (base - 0.03) * p;
        });
        if (p < 1) requestAnimationFrame(fadeIn);
      }
      requestAnimationFrame(fadeIn);
      // After fade-in completes, fly to newest growth item
      setTimeout(() => {
        if (growthMeshes.length > 0) {
          const sorted = [...growthMeshes].sort((a,b) => {
            const da = a.userData.data?.date || ''; const db = b.userData.data?.date || '';
            return db.localeCompare(da);
          });
          const newest = sorted[0];
          if (newest) {
            const pos = newest.getWorldPosition(new THREE.Vector3());
            const dir = pos.clone().normalize();
            if (dir.length() < 0.01) dir.set(1,0.3,1).normalize();
            const camTarget = pos.clone().add(dir.multiplyScalar(8)).add(new THREE.Vector3(0,2,0));
            latestFly = { active:true, startTime:performance.now(), duration:2500,
              fromPos:camera.position.clone(), toPos:camTarget,
              fromTarget:controls.target.clone(), toTarget:pos };
            presentCard(newest);
            drawConn(newest);
            activeTarget = newest;
          }
        }
      }, 2500);
    }, 3000);
  }, 4000);
});

if (INSTALL_MODE) {
  document.getElementById('intro').remove();
  document.body.style.cursor = 'none';
  document.getElementById('handBtn').style.display = 'none';
  controls.enabled = true;
  initAudio();
  camera.position.set(22, 8, 22);
  controls.target.set(0, -5, 0);
  // Auto-start journey after 5 seconds
  setTimeout(() => { startFly(); }, 5000);
}

// ─────────────────────────────────────────
// IMMERSIVE MODE (Shift+.)
// ─────────────────────────────────────────
let immersiveActive = false;
document.addEventListener('keydown', (e) => {
  if (e.key === '>' && e.shiftKey) {
    e.preventDefault();
    immersiveActive = !immersiveActive;
    if (immersiveActive) {
      document.body.classList.add('immersive-active');
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.body.classList.remove('immersive-active');
      if (document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
      }
    }
  }
});
// Exit immersive if user exits fullscreen via Escape
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && immersiveActive) {
    immersiveActive = false;
    document.body.classList.remove('immersive-active');
  }
});

animate();
</script>
