<script type="module">
  // anime.js v4 is ESM-only; bridge it onto window so the classic Babel script

  window.Anime = { animate, stagger, createTimeline, eases };
  window.dispatchEvent(new Event("anime:ready"));

const { useState, useEffect, useRef } = React;
const gsap = window.gsap;
const ScrollTrigger = window.ScrollTrigger;
gsap.registerPlugin(ScrollTrigger);

// ---- anime.js v4 bridge (loaded as an ES module on window.Anime) ----
function whenAnime(cb) {
  if (window.Anime) return cb(window.Anime);
  window.addEventListener("anime:ready", () => cb(window.Anime), { once: true });
}
// Run an anime.js entrance once `el` scrolls into view, then disconnect.
function onEnter(el, run, threshold = 0.2) {
  const io = new IntersectionObserver((entries) => {
    entries.forEach((e) => { if (e.isIntersecting) { run(); io.disconnect(); } });
  }, { threshold });
  io.observe(el);
  return () => io.disconnect();
}

function Prose() {

// ============== INLINE TYPOGRAPHY IMAGE statement ==============
function Statement() {
  const ref = useRef(null);
  useEffect(() => {
    let cleanup = () => {};
    whenAnime(({ animate, stagger }) => {
      const toks = ref.current.querySelectorAll(".tok");
      const zoomers = ref.current.querySelectorAll(".zoomer");
      // scroll-reveal: words + pills rise and fade in, staggered
      animate(toks, { translateY: "0.7em", opacity: 0, duration: 0 });
      cleanup = onEnter(ref.current, () => {
        animate(toks, { translateY: 0, opacity: 1, duration: 700, ease: "outCubic", delay: stagger(55) });
      });
      // continuous Ken-Burns zoom inside each pill, offset per pill
      animate(zoomers, {
        scale: [1, 1.3], duration: 7000, ease: "inOutSine",
        loop: true, alternate: true, delay: stagger(1200)
      });
    });
    return () => cleanup();
  }, []);
  const Pill = ({ seed }) => (
    <span className="tok relative inline-block align-middle mx-2 w-[clamp(3rem,7vw,7rem)] h-[clamp(2rem,4vw,3.6rem)] overflow-hidden rounded-full border border-white/15">
      <span className="zoomer absolute inset-0 bg-cover bg-center" style={{ backgroundImage: `url(${pic(seed,400,240)})` }} />
    </span>
  );
  const parts = [
    {w:"We"},{w:"taught"},{w:"machines"},{p:"eye-dream"},
    {w:"to"},{w:"dream"},{w:"in"},{w:"a"},{p:"hand-paint"},
    {w:"painter's"},{p:"clock-melt"},{w:"hand."}
  ];
  return (
    <section className="py-24 md:py-40 px-6">
      <h2 ref={ref} className="max-w-5xl mx-auto font-display text-4xl md:text-6xl leading-[1.3] text-center">
        {parts.map((part,i) => part.p
          ? <Pill key={i} seed={part.p} />
          : <span key={i} className="tok inline-block mr-[0.28em]">{part.w}</span>)}
      </h2>
    </section>
  );
}

// ===================== PINNED HORIZONTAL ARCHIVE =====================
function Archive() {
  const sectionRef = useRef(null);
  const trackRef = useRef(null);
  const titleRef = useRef(null);
  useEffect(() => {
    const ctx = gsap.context(() => {
      const track = trackRef.current;
      const amount = () => track.scrollWidth - window.innerWidth;
      gsap.to(track, {
        x: () => -amount(),
        ease: "none",
        scrollTrigger: {
          trigger: sectionRef.current, start: "top top",
          end: () => "+=" + amount(), scrub: 1, pin: true, invalidateOnRefresh: true
        }
      });
      // header fades out over the first third of the pinned scroll
      gsap.to(titleRef.current, {
        opacity: 0, ease: "none",
        scrollTrigger: {
          trigger: sectionRef.current, start: "top top",
          end: () => "+=" + amount() * 0.35, scrub: true, invalidateOnRefresh: true
        }
      });
    }, sectionRef);
    return () => ctx.revert();
  }, []);
  return (
    <section id="archive" ref={sectionRef} className="relative h-screen overflow-hidden bg-void">
      <div ref={titleRef} className="absolute inset-0 z-10 flex flex-col items-center justify-center text-center px-6 pointer-events-none">
        <div className="absolute w-[80vw] h-[60vh] rounded-full"
             style={{background:"radial-gradient(closest-side, rgba(7,6,19,.82), transparent 80%)"}} />
        <h2 className="relative font-display leading-[.95]" style={{fontSize:"clamp(3.5rem,11vw,9rem)"}}>The archive</h2>
        <p className="relative font-body text-paper/70 mt-4 whitespace-nowrap" style={{fontSize:"clamp(.7rem,2.1vw,1.2rem)"}}>Thousands of frames, generated and culled. A wall of dreams.</p>
      </div>
      <div ref={trackRef} className="absolute top-0 left-0 h-full flex items-center gap-4 pl-6 md:pl-10 pr-[40vw] will-change-transform">
        {FRAME_SEEDS.map((s,i) => (
          <div key={i} className="group relative shrink-0 w-[clamp(220px,26vw,380px)] aspect-video overflow-hidden border border-white/10">
            <img src={pic(s,800,500)} alt="" className="w-full h-full object-cover contrast-125 saturate-150 group-hover:scale-110 transition-transform duration-700" />
            <div className="absolute inset-0 bg-void/10 group-hover:bg-void/0 transition" />
          </div>
        ))}
      </div>
    </section>
  );
}

// ===================== FRAME WALL (scale/fade reveal) =====================
function Wall() {
  const ref = useRef(null);
  const COLS = 6, ROWS = 5;            // md grid is 6 wide; 30 cells -> 5 rows
  useEffect(() => {
    let cleanup = () => {};
    whenAnime(({ animate, stagger }) => {
      const cells = ref.current.querySelectorAll(".cell");
      // Hide only once anime is confirmed present, so a CDN failure leaves the
      // wall visible rather than blank.
      animate(cells, { scale: 0.2, opacity: 0, duration: 0 });
      // grid stagger from center — the anime.js "Advanced staggering" effect
      cleanup = onEnter(ref.current, () => {
        animate(cells, {
          scale: 1,
          opacity: 1,
          duration: 900,
          ease: "outElastic(1, .8)",
          delay: stagger(45, { grid: [COLS, ROWS], from: "center" })
        });
      });
    });
    return () => cleanup();
  }, []);
  return (
    <section className="py-24 md:py-40 px-6">
      <div ref={ref} className="max-w-6xl mx-auto grid grid-cols-3 md:grid-cols-6 gap-2 grid-flow-row-dense">
        {FRAME_SEEDS.concat(FRAME_SEEDS.slice(0,6)).map((s,i) => (
          <div key={i} className="cell group relative aspect-video overflow-hidden rounded-md">
            <img src={pic(s+"-wall",500,320)} alt="" className="w-full h-full object-cover contrast-125 saturate-150 group-hover:scale-110 transition-transform duration-700" />
          </div>
        ))}
      </div>
    </section>
  );
}
