name: Test

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

      - name: Type check
        run: pnpm run type-check

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm run test

  test-binary:
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            binary: firecrawl-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            binary: firecrawl-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            binary: firecrawl-windows-x64.exe

    runs-on: ${{ matrix.os }}
    name: Binary test (${{ matrix.os }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile binary
        run: bun build src/index.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.binary }}

      - name: Verify binary runs (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x ${{ matrix.binary }}
          ./${{ matrix.binary }} --version
          ./${{ matrix.binary }} --help

      - name: Verify binary runs (Windows)
        if: runner.os == 'Windows'
        run: |
          .\${{ matrix.binary }} --version
          .\${{ matrix.binary }} --help
