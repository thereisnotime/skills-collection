name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          python -m nltk.downloader punkt averaged_perceptron_tagger wordnet stopwords punkt_tab averaged_perceptron_tagger_eng
      - name: Lint with ruff
        run: ruff check .
      - name: Type check with mypy
        run: mypy --ignore-missing-imports ats_scorer.py hr_scorer.py llm_scorer.py docx_generator.py tracker_utils.py
        continue-on-error: true  # Don't block on type errors initially
      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=term-missing -x
        env:
          PYTHONDONTWRITEBYTECODE: 1
      - name: Check coverage
        run: pytest tests/ --cov=. --cov-fail-under=50
        continue-on-error: true  # Start with 50% target, increase later
