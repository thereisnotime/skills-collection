name: Wrapper Compatibility Check

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  check-surface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check wrapper compatibility with upstream v1
        run: ./scripts/check_upstream_action_surface.sh

  open-drift-issue:
    if: ${{ always() && needs.check-surface.result == 'failure' && github.event_name != 'pull_request' }}
    needs: [check-surface]
    runs-on: ubuntu-latest
    steps:
      - name: Create compatibility drift issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Drop-in wrapper drift detected against anthropics/claude-code-action@v1';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title);
            if (existing) {
              core.info(`Drift issue already open: #${existing.number}`);
              return;
            }

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              'The wrapper surface check failed against `anthropics/claude-code-action@v1`.',
              '',
              `- Workflow run: ${runUrl}`,
              '- Suggested action: run `./scripts/check_upstream_action_surface.sh` locally and update `action.yml` input/output surface.',
            ].join('\n');

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });

            core.info(`Created drift issue #${created.data.number}`);
