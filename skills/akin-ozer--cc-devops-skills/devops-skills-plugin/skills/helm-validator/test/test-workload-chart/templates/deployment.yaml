apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "test-workload-chart.fullname" . }}
  labels:
    {{- include "test-workload-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "test-workload-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "test-workload-chart.selectorLabels" . | nindent 8 }}
    spec:
      # Intentional Stage 9 violations — see README.md and values.yaml for details.
      # Missing: pod security context, container security context, resources, probes.
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
