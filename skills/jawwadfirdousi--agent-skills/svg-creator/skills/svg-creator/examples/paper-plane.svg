<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="plane-title plane-desc">
  <title id="plane-title">Animated paper plane</title>
  <desc id="plane-desc">A blue paper plane angled upward, gliding gently forward and back with a soft motion trail</desc>

  <g transform="translate(32 32) rotate(-25)">
    <g>
      <animateTransform attributeName="transform" type="translate"
                        values="-2.5 0; 3 0; -2.5 0"
                        dur="3.6s"
                        repeatCount="indefinite"
                        calcMode="spline"
                        keyTimes="0;0.5;1"
                        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>

      <g fill="none" stroke="#60A5FA" stroke-linecap="round">
        <path d="M -10,-2 Q -18,-2 -26,-1.2" stroke-width="1.5" stroke-dasharray="0.8 3" opacity="0.55"/>
        <path d="M -10,2 Q -18,2 -26,1.2" stroke-width="1.3" stroke-dasharray="0.8 3" opacity="0.4"/>
      </g>

      <path d="M 14,0 L -2,0 L -12,8 Z" fill="#3B82F6"/>
      <path d="M 14,0 L -12,-8 L -2,0 Z" fill="#93C5FD"/>
      <path d="M 14,0 L -12,-8 L -2,0 L -12,8 Z" fill="none" stroke="#1E40AF" stroke-width="0.9" stroke-linejoin="round"/>
      <path d="M 14,0 L -2,0" stroke="#1E40AF" stroke-width="0.9" stroke-linecap="round" fill="none"/>
    </g>
  </g>
</svg>
