<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-labelledby="pulse-sun-title">
  <title id="pulse-sun-title">Pulsing rotating sun</title>
