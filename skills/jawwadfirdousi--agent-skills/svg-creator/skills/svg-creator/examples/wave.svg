<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="wave-title wave-desc">
  <title id="wave-title">Animated ocean wave</title>
  <desc id="wave-desc">A deep blue ocean wave with an aqua ripple highlight, gently flowing sideways in a seamless loop</desc>

  <defs>
    <clipPath id="wave-clip">
      <rect x="0" y="0" width="64" height="64"/>
    </clipPath>
  </defs>

  <g clip-path="url(#wave-clip)">
    <g>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; -64 0"
                        dur="7s"
                        repeatCount="indefinite"
                        calcMode="linear"/>

      <path d="M -64,40 Q -48,26 -32,40 T 0,40 T 32,40 T 64,40 T 96,40 T 128,40 L 128,64 L -64,64 Z"
            fill="#1E40AF"/>

      <path d="M -64,32 Q -48,18 -32,32 T 0,32 T 32,32 T 64,32 T 96,32 T 128,32"
            fill="none" stroke="#22D3EE" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
    </g>
  </g>
</svg>
