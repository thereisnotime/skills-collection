        dur="1.15s"
        calcMode="spline"
        keySplines=".4 0 .2 1;.4 0 .2 1;.4 0 .2 1;.4 0 .2 1"
        repeatCount="indefinite"/>
      <path transform="translate(-12 -12)" fill="url(#heart-fill)" d="M12 20.4C11.6 20 5.1 14.4 4 10.3C3.2 7 5.3 4.3 8.3 4.3C10 4.3 11.2 5.2 12 6.4C12.8 5.2 14 4.3 15.7 4.3C18.7 4.3 20.8 7 20 10.3C18.9 14.4 12.4 20 12 20.4Z"/>
