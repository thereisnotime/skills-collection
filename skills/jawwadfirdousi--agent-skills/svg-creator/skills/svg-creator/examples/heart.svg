<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" role="img" aria-labelledby="heart-title heart-desc">
  <title id="heart-title">Animated heart icon</title>
  <desc id="heart-desc">A warm red heart gently pulsing in place.</desc>
  <defs>
    <linearGradient id="heart-fill" x1="6" y1="5" x2="18" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FB7185"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
  </defs>
  <g transform="translate(12 12)">
