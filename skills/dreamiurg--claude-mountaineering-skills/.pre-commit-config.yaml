# Pre-commit configuration
# Install: pip install pre-commit && pre-commit install --install-hooks --hook-type pre-push
# Run all: pre-commit run --all-files

repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python formatting and linting with ruff (replaces black, isort, flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.4
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - pydantic
        args: [--ignore-missing-imports, --implicit-optional]
        files: ^skills/route-researcher/tools/

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: ['--fix']

  # JSON Schema validation for plugin files
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.31.3
    hooks:
      - id: check-jsonschema
        name: validate marketplace.json
        files: ^\.claude-plugin/(marketplace\.json|schemas/marketplace\.schema\.json)$
        pass_filenames: false
        args:
          - --schemafile
          - .claude-plugin/schemas/marketplace.schema.json
          - .claude-plugin/marketplace.json
      - id: check-jsonschema
        name: validate plugin.json
        files: ^\.claude-plugin/(plugin\.json|schemas/plugin\.schema\.json)$
        pass_filenames: false
        args:
          - --schemafile
          - .claude-plugin/schemas/plugin.schema.json
          - .claude-plugin/plugin.json

  # Secrets detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.23.3
    hooks:
      - id: gitleaks

  # Pre-push: Run pytest
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'cd skills/route-researcher/tools && python -m pytest -q'
        language: system
        types: [python]
        stages: [pre-push]
        pass_filenames: false

# CI configuration
ci:
  skip: [mypy, pytest]  # Skip in CI (handled by CI pipelines)
