name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          # Install any requirements if they exist
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Check for requirements in skills directories
          find . -name "requirements.txt" -not -path "*/.git/*" -exec pip install -r {} \;
      - name: Run tests
        run: pytest --tb=short -q
        continue-on-error: true

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        run: semgrep scan --config auto --error .

  validate-plugin:
    name: Validate Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pip install check-jsonschema==0.31.3
      - name: Validate marketplace.json
        run: >-
          check-jsonschema
          --schemafile .claude-plugin/schemas/marketplace.schema.json
          .claude-plugin/marketplace.json
      - name: Validate plugin.json
        run: >-
          check-jsonschema
          --schemafile .claude-plugin/schemas/plugin.schema.json
          .claude-plugin/plugin.json

  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest
    needs: [lint, sast, validate-plugin]
    if: always()
    steps:
      - name: Check results
        run: exit 1
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
