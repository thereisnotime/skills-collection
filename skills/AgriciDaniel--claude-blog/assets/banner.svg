<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1680 768" width="100%"
     preserveAspectRatio="xMidYMid meet" role="img"
     aria-label="Claude Blog вҖ” The Content Operating System"
     font-family="JetBrains Mono, monospace">
<title>Claude Blog вҖ” AI-Powered Content Authority Skill for Claude Code</title>
<desc>OS-window banner. Dark warm title bar with traffic lights. Dark CRT terminal inside with CLAUDE BLOG figlet logo in brand-orange vertical gradient, animated row-highlight scanner cycling through 7 /blog commands.</desc>

<defs>
  <style type="text/css"><![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
    .ascii      { font-family: 'JetBrains Mono', 'Cascadia Mono', 'Menlo', monospace; font-size: 22px; font-weight: 700; fill: url(#orangeGrad); }
    .tagline    { font-family: 'Inter', system-ui, sans-serif; font-size: 28px; font-weight: 500; fill: #F5F4ED; letter-spacing: -0.3px; }
    .sysline    { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #7A3A1F; letter-spacing: 1.8px; }
    .sysline-accent { fill: #D97757; }
    .hud        { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #7A3A1F; letter-spacing: 1.6px; }
    .hud-muted  { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #5A5750; letter-spacing: 1.6px; }
    .cmd        { font-family: 'JetBrains Mono', monospace; font-size: 30px; fill: #5A5750; letter-spacing: 0.5px; }
    .cmd-active { fill: #F5F4ED; }
    .cmd-slash  { fill: #7A3A1F; }
    .cmd-arg    { fill: #7A3A1F; opacity: 0.7; }
    .cmd-head   { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #D97757; letter-spacing: 2px; opacity: 0.65; }
    .cmd-head-b { fill: #7A3A1F; }
    .accent-line{ fill: #D97757; }
    .live-dot   { fill: #D97757; }
    .win-title  { font-family: 'JetBrains Mono', monospace; font-size: 15px; fill: #E0D2C4; font-weight: 600; }
  ]]></style>

  <linearGradient id="orangeGrad" x1="0" y1="-0.3" x2="0" y2="1.3" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#F5B095"/>
    <stop offset="25%"  stop-color="#E89270"/>
    <stop offset="50%"  stop-color="#D97757"/>
    <stop offset="75%"  stop-color="#7A3A1F"/>
    <stop offset="100%" stop-color="#5C2A14"/>
    <animate attributeName="y1" values="-0.3;0.3;-0.3" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0.7;1.3;0.7"   dur="4.2s" repeatCount="indefinite"/>
  </linearGradient>

  <pattern id="scanlines" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
    <rect width="3" height="2" fill="transparent"/>
    <rect x="0" y="2" width="3" height="1" fill="rgba(0,0,0,0.18)"/>
  </pattern>
</defs>

<!-- OS window shell (dark) -->
<rect x="0.5" y="0.5" width="1679" height="767" rx="10" fill="#2A2520" stroke="#3A312A" stroke-width="1"/>
<path d="M 0 10 Q 0 0 10 0 L 1670 0 Q 1680 0 1680 10 L 1680 48 L 0 48 Z" fill="#2A2520"/>
<line x1="0" y1="48" x2="1680" y2="48" stroke="#3A312A" stroke-width="1"/>
<text x="20" y="29" class="win-title">claude-blog.app вҖ” Terminal В· /blog write</text>
<circle cx="1596" cy="24" r="9" fill="#fbbf24" stroke="#3A312A" stroke-width="0.7"/>
<circle cx="1624" cy="24" r="9" fill="#10b981" stroke="#3A312A" stroke-width="0.7"/>
<circle cx="1652" cy="24" r="9" fill="#ef4444" stroke="#3A312A" stroke-width="0.7"/>

<g transform="translate(0, 48)">
  <rect width="1680" height="720" fill="#1F1B16"/>
  <rect width="1680" height="720" fill="url(#scanlines)" opacity="0.45"/>

  <rect x="0" y="0" width="1680" height="26" fill="#0A0807"/>
  <line x1="0" y1="26" x2="1680" y2="26" stroke="rgba(217,119,87,0.30)" stroke-width="1"/>
  <circle cx="26" cy="13" r="3" class="live-dot">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="38"   y="17" class="hud">SYS В· CLAUDE-BLOG</text>
  <text x="220"  y="17" class="hud">NODE 0x2B В· ACTIVE</text>
  <text x="1660" y="17" class="hud-muted" text-anchor="end">UPTIME 04:12:08</text>

  <rect x="0" y="694" width="1680" height="26" fill="#0A0807"/>
  <line x1="0" y1="694" x2="1680" y2="694" stroke="rgba(217,119,87,0.30)" stroke-width="1"/>
  <text x="20"   y="711" class="hud">в—Ҹ LINK В· STABLE</text>
  <text x="180"  y="711" class="hud">BUF 1024K</text>
  <text x="290"  y="711" class="hud">V1.9.0</text>
  <text x="1450" y="711" class="hud-muted" text-anchor="end">208.140.MAINFRAME.AGRICIDANIEL</text>
  <text x="1660" y="711" class="hud-muted" text-anchor="end">12:08:20 UTC</text>

  <text x="120" y="155" class="ascii" xml:space="preserve">
    <tspan x="120" dy="0">  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—      в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—</tspan>
    <tspan x="120" dy="26">в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ</tspan>
    <tspan x="120" dy="26">в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—</tspan>
    <tspan x="120" dy="26">в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•қ</tspan>
    <tspan x="120" dy="26">в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—</tspan>
    <tspan x="120" dy="26"> в•ҡв•җв•җв•җв•җв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•җв•қ</tspan>
  </text>

  <text x="120" y="335" class="ascii" xml:space="preserve">
    <tspan x="120" dy="0">в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—      в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— </tspan>
    <tspan x="120" dy="26">в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ </tspan>
    <tspan x="120" dy="26">в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв–Ҳв•—</tspan>
    <tspan x="120" dy="26">в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘</tspan>
    <tspan x="120" dy="26">в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ</tspan>
    <tspan x="120" dy="26">в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ  в•ҡв•җв•җв•җв•җв•җв•қ </tspan>
  </text>

  <rect x="120" y="500" width="540" height="3" rx="2" class="accent-line">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4.2s" repeatCount="indefinite"/>
  </rect>

  <text x="120" y="545" class="tagline">The Content Operating System</text>
  <text x="120" y="580" class="sysline">
    <tspan class="sysline-accent">вҖә</tspan> RUNTIME READY В· 30 SUB-SKILLS В· 5 AGENTS В· 5-GATE CONTRACT
  </text>

  <g transform="translate(1660, 100)">
    <text class="cmd-head" text-anchor="end" y="0">
      <tspan class="cmd-head-b">в”Ңв”Җ </tspan>COMMAND PALETTE<tspan class="cmd-head-b"> в”Җв”җ</tspan>
    </text>

    <rect x="-470" y="30" width="490" height="44" rx="4"
          fill="rgba(217,119,87,0.12)" stroke="rgba(217,119,87,0.28)" stroke-width="1">
      <animate attributeName="y"
               values="30;80;130;180;230;280;330;-200"
               keyTimes="0;0.123;0.246;0.368;0.491;0.614;0.737;0.860"
               dur="5.7s"
               calcMode="discrete"
               repeatCount="indefinite"/>
    </rect>

    <text class="cmd" text-anchor="end" y="55">
      <tspan class="cmd-slash">/</tspan>blog write
      <animate attributeName="fill" values="#F5F4ED;#F5F4ED;#5A5750" keyTimes="0;0.122;0.125" dur="5.7s" begin="0s"   repeatCount="indefinite"/>
    </text>
    <text class="cmd" text-anchor="end" y="105">
      <tspan class="cmd-slash">/</tspan>blog audit
      <animate attributeName="fill" values="#F5F4ED;#F5F4ED;#5A5750" keyTimes="0;0.122;0.125" dur="5.7s" begin="0.7s" repeatCount="indefinite"/>
    </text>
    <text class="cmd" text-anchor="end" y="155">
      <tspan class="cmd-slash">/</tspan>blog cluster
      <animate attributeName="fill" values="#F5F4ED;#F5F4ED;#5A5750" keyTimes="0;0.122;0.125" dur="5.7s" begin="1.4s" repeatCount="indefinite"/>
    </text>
    <text class="cmd" text-anchor="end" y="205">
      <tspan class="cmd-slash">/</tspan>blog geo
      <animate attributeName="fill" values="#F5F4ED;#F5F4ED;#5A5750" keyTimes="0;0.122;0.125" dur="5.7s" begin="2.1s" repeatCount="indefinite"/>
    </text>
    <text class="cmd" text-anchor="end" y="255">
      <tspan class="cmd-slash">/</tspan>blog multilingual
      <animate attributeName="fill" values="#F5F4ED;#F5F4ED;#5A5750" keyTimes="0;0.122;0.125" dur="5.7s" begin="2.8s" repeatCount="indefinite"/>
    </text>
    <text class="cmd" text-anchor="end" y="305">
      <tspan class="cmd-slash">/</tspan>blog flow <tspan class="cmd-arg">&lt;stage&gt;</tspan>
      <animate attributeName="fill" values="#F5F4ED;#F5F4ED;#5A5750" keyTimes="0;0.122;0.125" dur="5.7s" begin="3.5s" repeatCount="indefinite"/>
    </text>
    <text class="cmd" text-anchor="end" y="355">
      <tspan class="cmd-slash">/</tspan>blog brand
      <animate attributeName="fill" values="#F5F4ED;#F5F4ED;#5A5750" keyTimes="0;0.122;0.125" dur="5.7s" begin="4.2s" repeatCount="indefinite"/>
    </text>

    <rect x="-3" y="35" width="18" height="26" fill="#F5F4ED">
      <animate attributeName="y"
               values="35;85;135;185;235;285;335;-100"
               keyTimes="0;0.123;0.246;0.368;0.491;0.614;0.737;0.860"
               dur="5.7s"
               calcMode="discrete"
               repeatCount="indefinite"/>
      <animate attributeName="opacity"
               values="1;1;0;1;1;0;1"
               keyTimes="0;0.2;0.25;0.3;0.7;0.75;1"
               dur="0.7s"
               repeatCount="indefinite"/>
    </rect>
  </g>
</g>

</svg>
