version: 2
updates:
  # Python dependencies (root pyproject.toml + requirements.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Nested skill venvs - audit VULN-504 (Dependabot was blind to these)
  - package-ecosystem: "pip"
    directory: "/skills/blog-google/scripts"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "pip"
    directory: "/skills/blog-notebooklm/scripts"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "pip"
    directory: "/skills/blog-audio/scripts"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
