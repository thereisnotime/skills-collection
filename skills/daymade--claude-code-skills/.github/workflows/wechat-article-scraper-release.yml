# GitHub Actions Workflow: Build and Release
# Builds CLI executables for multiple platforms and Docker images

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v3.21.0)'
        required: true
        default: 'v3.21.0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/wechat-article-scraper

jobs:
  # ============================================================================
  # Build CLI Executables
  # ============================================================================
  build-cli:
    name: Build CLI - ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (Apple Silicon)
          - os: macos
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            ext: ''
          # macOS x64 (Intel)
          - os: macos
            arch: x64
            runner: macos-12
            target: x86_64-apple-darwin
            ext: ''
          # Linux x64
          - os: linux
            arch: x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
          # Windows x64
          - os: windows
            arch: x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            ext: '.exe'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install uv (Windows)
        if: runner.os == 'Windows'
        run: |
          powershell -c "irm https://astral.sh/uv/install.ps1 | iex"
          echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Create virtual environment
        working-directory: ./wechat-article-scraper/cli
        run: uv venv

      - name: Install dependencies
        working-directory: ./wechat-article-scraper/cli
        run: |
          uv pip install pyinstaller typer rich pyyaml requests beautifulsoup4 html2text markdownify openpyxl reportlab scrapling jinja2

      - name: Build executable (Unix)
        if: runner.os != 'Windows'
        working-directory: ./wechat-article-scraper/cli
        run: |
          source .venv/bin/activate
          pyinstaller w.spec --clean

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        working-directory: ./wechat-article-scraper/cli
        shell: pwsh
        run: |
          .venv\Scripts\Activate.ps1
          pyinstaller w.spec --clean

      - name: Rename artifact
        working-directory: ./wechat-article-scraper/cli/dist
        shell: bash
        env:
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          if [ "$MATRIX_OS" = "windows" ]; then
            mv w.exe "w-$MATRIX_OS-$MATRIX_ARCH.exe"
          else
            mv w "w-$MATRIX_OS-$MATRIX_ARCH"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: w-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wechat-article-scraper/cli/dist/w-*
          retention-days: 7

  # ============================================================================
  # Build and Push Docker Image
  # ============================================================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./wechat-article-scraper
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Create GitHub Release
  # ============================================================================
  create-release:
    name: Create GitHub Release
    needs: [build-cli, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: w-*

      - name: Display artifacts
        run: |
          ls -la ./artifacts/
          find ./artifacts -type f -name "w-*" | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Update Skill Version in Marketplace
  # ============================================================================
  update-marketplace:
    name: Update Marketplace Version
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: get_version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Update marketplace.json version
        env:
          EXTRACTED_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          VERSION="$EXTRACTED_VERSION"
          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"

          # Update wechat-article-scraper plugin version
          python3 << EOF
          import json

          with open('.claude-plugin/marketplace.json', 'r') as f:
              data = json.load(f)

          # Find and update wechat-article-scraper plugin
          for plugin in data['plugins']:
              if plugin['name'] == 'wechat-article-scraper':
                  old_version = plugin['version']
                  plugin['version'] = "$VERSION"
                  print(f"Updated {plugin['name']}: {old_version} -> $VERSION")
                  break

          with open('.claude-plugin/marketplace.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          EOF

      - name: Commit version update
        env:
          RELEASE_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .claude-plugin/marketplace.json
          git diff --staged --quiet || git commit -m "chore: bump wechat-article-scraper version to $RELEASE_VERSION"
          git push
