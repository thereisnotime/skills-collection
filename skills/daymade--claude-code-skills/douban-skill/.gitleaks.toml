# Gitleaks config for douban-skill.
#
# The two "generic-api-key" hits are false positives: the Frodo API key and HMAC
# secret are the PUBLIC Android APK credentials shared by every Douban app user
# (discovered via standard APK reverse engineering). They are not user secrets
# and are intentionally hardcoded so the skill works without any auth setup.
#
# See scripts/douban-frodo-export.py for the inline rationale.

title = "douban-skill allowlist"

[extend]
useDefault = true

[allowlist]
description = "Public Douban Android APK credentials (not user secrets)"
regexes = [
  '''0dad551ec0f84ed02907ff5c42e8ec70''',  # Frodo API key
  '''bf7dddc7c9cfe6f7''',                   # HMAC secret
]
