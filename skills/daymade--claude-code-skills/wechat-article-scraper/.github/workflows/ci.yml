name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Job 1: Code Quality Checks
  # ============================================
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: |
          cd cloud
          npm ci

      - name: Run ESLint
        run: |
          cd cloud
          npm run lint

      - name: Run TypeScript type check
        run: |
          cd cloud
          npm run typecheck

      - name: Run Prettier check
        run: |
          cd cloud
          npm run format:check

  # ============================================
  # Job 2: Unit Tests with Coverage
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: |
          cd cloud
          npm ci

      - name: Run unit tests
        run: |
          cd cloud
          npm run test:unit -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cloud/coverage/lcov.info
          flags: unittests
          name: unit-tests-coverage
          fail_ci_if_error: false

      - name: Check coverage threshold
        run: |
          cd cloud
          npm run test:unit -- --coverage --threshold=30

  # ============================================
  # Job 3: Integration Tests
  # ============================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: |
          cd cloud
          npm ci

      - name: Setup test database
        run: |
          cd cloud
          npm run db:migrate:test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test

      - name: Run integration tests
        run: |
          cd cloud
          npm run test:integration
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
          NODE_ENV: test

  # ============================================
  # Job 4: E2E Tests with Stagehand
  # ============================================
  e2e-tests:
    name: E2E Tests (Stagehand)
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: |
          cd cloud
          npm ci

      - name: Install Playwright browsers
        run: |
          cd cloud
          npx playwright install --with-deps chromium

      - name: Build application
        run: |
          cd cloud
          npm run build

      - name: Run E2E tests
        run: |
          cd cloud
          npm run test:e2e
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_URL: http://localhost:3000

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            cloud/e2e/report/
            cloud/e2e/results.xml
          retention-days: 30

  # ============================================
  # Job 5: Benchmark Tests
  # ============================================
  benchmark-tests:
    name: Benchmark Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: |
          cd cloud
          npm ci

      - name: Run benchmark tests
        run: |
          cd cloud
          npm run test:benchmark

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            cloud/tests/benchmark/*.json
            cloud/tests/benchmark/*.md
          retention-days: 90

  # ============================================
  # Job 6: Security Scan
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run npm audit
        run: |
          cd cloud
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================
  # Job 7: Build Verification
  # ============================================
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: |
          cd cloud
          npm ci

      - name: Build application
        run: |
          cd cloud
          npm run build

      - name: Check bundle size
        run: |
          cd cloud
          npm run analyze
        continue-on-error: true
