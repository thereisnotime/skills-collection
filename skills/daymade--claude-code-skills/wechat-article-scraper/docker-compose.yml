# 微信文章抓取助手 - Docker Compose 配置
# World-class WeChat Article Scraper
#
# 一键启动完整服务:
#   docker-compose up -d
#
# 查看日志:
#   docker-compose logs -f
#
# 数据持久化在 ./data 目录

version: "3.8"

services:
  wechat-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    image: wechat-article-scraper:latest
    container_name: wechat-scraper

    # 端口映射
    ports:
      - "8000:8000"

    # 数据持久化
    volumes:
      # 数据目录
      - ./data:/data
      # 可选: 挂载配置文件
      # - ./config.yaml:/data/config/config.yaml:ro

    # 环境变量
    environment:
      - WECHAT_DATA_DIR=/data
      - WECHAT_CONFIG_DIR=/data/config
      - PYTHONUNBUFFERED=1
      # 可选: API keys
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}

    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 重启策略
    restart: unless-stopped

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # 网络
    networks:
      - wechat-scraper-network

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # 可选: 使用已有的 MongoDB 或 PostgreSQL
  # 如需外部数据库，取消注释并配置

  # redis:
  #   image: redis:7-alpine
  #   container_name: wechat-scraper-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - wechat-scraper-network

networks:
  wechat-scraper-network:
    driver: bridge

volumes:
  data:
    driver: local
  # redis_data:
  #   driver: local
