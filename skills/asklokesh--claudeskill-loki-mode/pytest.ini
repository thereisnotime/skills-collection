[pytest]
# Exclude Docker integration tests by default -- they require a live server
# Run with: pytest tests/docker/ to execute Docker tests explicitly
testpaths = tests
norecursedirs = tests/docker tests/fixtures
asyncio_mode = auto
# Collect both underscore (test_*.py) and hyphen (test-*.py) named files.
# The repo has long carried hyphen-named Python tests (e.g.
# test-memory-retrieval-bugs.py, test-memory-consolidation-merge.py) that the
# default test_*.py-only pattern silently skipped, so their regression guards
# never ran under `pytest tests/`. Adding test-*.py here makes every Python
# test file in tests/ visible to the standing gate.
python_files = test_*.py test-*.py
