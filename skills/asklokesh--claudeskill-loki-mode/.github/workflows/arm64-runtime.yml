name: ARM64 Runtime Smoke Test (qemu)

# v7.4.10: actually exercise the linux/arm64 Docker image at runtime via
# qemu emulation. Closes the W2-R6/C3 gap where buildx shipped the image
# but no test ever ran the binary on ARM64. Slow (~3-8 min) because qemu
# emulates the full instruction set, but free + reproducible.
#
# Triggers on every release publish. Manual dispatch lets us re-test any
# previously published image.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to smoke test (default: latest)'
        required: false
        default: 'latest'

permissions:
  contents: read

jobs:
  arm64-smoke:
    name: arm64 docker run --platform smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -z "$TAG" ] && TAG="${{ github.event.inputs.tag }}"
          [ -z "$TAG" ] && TAG="latest"
          VERSION="${TAG#v}"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Pull arm64 image
        run: |
          docker pull --platform linux/arm64 "asklokesh/loki-mode:${{ steps.tag.outputs.value }}"

      - name: loki version (arm64)
        run: |
          OUT=$(docker run --rm --platform linux/arm64 "asklokesh/loki-mode:${{ steps.tag.outputs.value }}" version)
          echo "$OUT"
          echo "$OUT" | grep -q "^Loki Mode v" || { echo "::error::loki version did not return expected output"; exit 1; }

      - name: loki status --json (arm64) -- valid JSON parse
        run: |
          docker run --rm --platform linux/arm64 "asklokesh/loki-mode:${{ steps.tag.outputs.value }}" status --json \
            | python3 -c "import sys, json; d = json.load(sys.stdin); assert 'version' in d, 'missing version'; print('arm64 status JSON ok, version=' + d['version'])"

      - name: loki doctor --json (arm64) -- bun + node + python detected
        run: |
          docker run --rm --platform linux/arm64 "asklokesh/loki-mode:${{ steps.tag.outputs.value }}" doctor --json \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          checks = {c['command']: c for c in d['checks']}
          required = ['bun', 'node', 'python3']
          missing = [r for r in required if r not in checks]
          assert not missing, f'arm64 image missing tools: {missing}'
          print('arm64 doctor JSON ok; bun=' + checks['bun']['status'] + ' node=' + checks['node']['status'])
          "

      - name: LOKI_LEGACY_BASH=1 fallthrough (arm64)
        run: |
          OUT=$(docker run --rm --platform linux/arm64 -e LOKI_LEGACY_BASH=1 "asklokesh/loki-mode:${{ steps.tag.outputs.value }}" version)
          echo "$OUT" | grep -q "^Loki Mode v" || { echo "::error::arm64 bash route fallthrough failed"; exit 1; }

      - name: Summary
        if: always()
        run: |
          {
            echo "## ARM64 runtime smoke test"
            echo ""
            echo "- Image: asklokesh/loki-mode:${{ steps.tag.outputs.value }} (linux/arm64)"
            echo "- Test machine: ubuntu-latest with qemu arm64 emulation"
            echo "- Bun route: verified"
            echo "- Bash fallthrough: verified"
            echo "- doctor JSON: verified"
          } >> "$GITHUB_STEP_SUMMARY"
