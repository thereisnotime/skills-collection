name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/asklokesh/loki-mode/blob/main/CLA.md'
          branch: 'main'
          allowlist: asklokesh,dependabot[bot],github-actions[bot]
          create-file-commit-message: 'docs: create CLA signature file'
          signed-commit-message: 'docs: $contributorName signed the CLA in #$pullRequestNo'
          custom-notsigned-prcomment: >-
            Thank you for your contribution. Before we can merge this, you need
            to sign our [Contributor License Agreement](https://github.com/asklokesh/loki-mode/blob/main/CLA.md).

            Please comment below with exactly this text to sign:

            `I have read the CLA Document and I hereby sign the CLA`
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you.'
          lock-pullrequest-aftermerge: true
