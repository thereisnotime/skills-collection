name: Security Audit

# Runs `npm audit` (and `bun audit` if available) on every PR and weekly.
# Fails the workflow on high or critical vulnerabilities.

on:
  pull_request:
    branches: [main]
  schedule:
    # Mondays at 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (with lockfile so npm audit can apply package.json overrides)
        run: npm install

      - name: npm audit (production deps, high+)
        run: |
          set +e
          npm audit --omit=dev --audit-level=high
          ec=$?
          set -e
          if [ "$ec" -ne 0 ]; then
            echo "::error::npm audit reported high or critical vulnerabilities"
            exit "$ec"
          fi
          echo "npm audit clean at high+ severity"

  bun-audit:
    name: bun audit (best-effort)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Probe for `bun audit` subcommand
        id: probe
        run: |
          set +e
          bun audit --help >/dev/null 2>&1
          ec=$?
          set -e
          if [ "$ec" -eq 0 ]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::notice::`bun audit` not available in bun v1.3.13 -- skipping"
          fi

      - name: Install loki-ts dependencies
        if: steps.probe.outputs.supported == 'true'
        working-directory: loki-ts
        run: bun install

      - name: Run bun audit
        if: steps.probe.outputs.supported == 'true'
        working-directory: loki-ts
        run: |
          set +e
          bun audit
          ec=$?
          set -e
          if [ "$ec" -ne 0 ]; then
            echo "::error::bun audit reported vulnerabilities"
            exit "$ec"
          fi
          echo "bun audit clean"
