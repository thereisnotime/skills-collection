name: Mutation Testing (stryker)

# DISABLED 2026-05-22: stale Stryker config produces false negatives against
# 700+ working unit tests. Specifically:
#   - asserts "5 providers" in output (now 4 after v7.5.18 Gemini removal)
#   - expects "claude" string in provider output that no longer appears verbatim
#   - VERSION file path no longer copied into .stryker-tmp working dir
# The scheduled cron run is commented out below. `workflow_dispatch` remains
# enabled so the workflow can still be triggered manually for investigation.
# Re-enabling the cron requires fixing stryker.config.json + the affected
# test assertions first. See architect note re: DISABLE-not-DELETE decision.

# v7.4.10: opt-in mutation testing for the highest-blast-radius runner
# modules (state.ts, build_prompt.ts, providers.ts, budget.ts,
# checkpoint.ts, shell.ts). Stryker uses bun:test as the runner via the
# `command` runner; ~10-25 minutes per run, so weekly + manual only.
#
# Threshold: 50% break / 60% low / 80% high (matches stryker.config.json).
# A drop below 50% fails the workflow.

on:
  # schedule:
  #   - cron: '0 11 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation:
    name: stryker run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install loki-ts deps
        working-directory: loki-ts
        run: bun install

      - name: Install stryker
        working-directory: loki-ts
        run: npm install --no-save @stryker-mutator/core

      - name: Run stryker
        working-directory: loki-ts
        run: npx stryker run

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: loki-ts/mutation/
          if-no-files-found: warn
          retention-days: 90
