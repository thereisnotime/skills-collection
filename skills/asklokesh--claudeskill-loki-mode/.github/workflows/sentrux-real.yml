name: Sentrux Real-Binary Integration

# v7.5.15: Gated workflow for tests/integration/test_sentrux_real.sh.
#
# This workflow is INTENTIONALLY not part of the default CI matrix because:
#   1. Downloading the real sentrux binary on every push is expensive.
#   2. sentrux v0.5.7 may not have a stable release-asset URL on Linux yet.
#   3. The unit tests in tests/test-sentrux-gate.sh (run by test.yml shell-tests)
#      already cover the parser/contract layer with a fake on-PATH binary.
#
# Trigger options:
#   - workflow_dispatch: manual run from the Actions tab.
#   - schedule: nightly at 04:17 UTC (off-peak, low contention).
#
# This workflow does NOT block any other workflow and is informational only.

on:
  workflow_dispatch:
  schedule:
    # 04:17 UTC nightly -- arbitrary off-peak slot to avoid cron-storm hour.
    - cron: '17 4 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sentrux-real:
    name: Sentrux real binary on linux-x86_64
    runs-on: ubuntu-latest
    # Soft failure: this job is informational. It must never gate other CI.
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for tiny TypeScript fixture project)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Attempt to install sentrux v0.5.7 (linux-x86_64)
        id: install_sentrux
        # Best-effort: try the documented release asset first, then npm,
        # then mark the step as skipped if neither path works. We do NOT
        # fail the job here because v0.5.7 distribution is still
        # stabilizing and we don't want a 404 to page anyone.
        run: |
          set -u
          INSTALLED=0
          # Path 1: GitHub release asset (replace owner/repo if upstream moves).
          ASSET_URL="https://github.com/sentrux-dev/sentrux/releases/download/v0.5.7/sentrux-linux-x86_64.tar.gz"
          if curl -fsSL --max-time 30 -o /tmp/sentrux.tgz "$ASSET_URL" 2>/dev/null; then
            mkdir -p /tmp/sentrux-bin
            tar -xzf /tmp/sentrux.tgz -C /tmp/sentrux-bin || true
            if [ -x /tmp/sentrux-bin/sentrux ]; then
              echo "/tmp/sentrux-bin" >> "$GITHUB_PATH"
              INSTALLED=1
            fi
          fi
          # Path 2: npm fallback (if upstream ships an npm shim).
          if [ "$INSTALLED" = "0" ]; then
            if npm install -g sentrux@0.5.7 2>/dev/null; then
              if command -v sentrux >/dev/null 2>&1; then
                INSTALLED=1
              fi
            fi
          fi
          if [ "$INSTALLED" = "1" ]; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
            sentrux --version || true
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
            echo "WARNING: sentrux v0.5.7 not installable from any known channel; test will SKIP cleanly."
          fi

      - name: Run real-binary integration test
        # The test itself skips with PASS when sentrux is not on PATH, so this
        # is a no-op when the install step above could not find a binary.
        run: bash tests/integration/test_sentrux_real.sh

      - name: Upload test logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentrux-real-logs-${{ github.run_id }}
          path: |
            /tmp/sentrux-*.log
            .sentrux/
          if-no-files-found: ignore
          retention-days: 7
