name: Supply-Chain Provenance (Sigstore)

# v7.4.10: signs npm tarball + Docker image digests with sigstore/cosign
# in keyless mode (OIDC token from GitHub Actions). Produces .sig + .pem
# attached to the GitHub Release. Closes the W2-R6 supply-chain provenance
# gap.
#
# Verification (downstream consumers):
#   cosign verify-blob \
#     --signature loki-mode-X.Y.Z.tgz.sig \
#     --certificate loki-mode-X.Y.Z.tgz.pem \
#     --certificate-identity-regexp 'https://github.com/asklokesh/loki-mode/.github/workflows/provenance.yml@.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     loki-mode-X.Y.Z.tgz
#
# Triggers: only on release publish (after release.yml has tagged + uploaded).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sign (e.g. v7.4.10)'
        required: true

permissions:
  id-token: write
  contents: write
  packages: read

jobs:
  sign-npm-tarball:
    name: cosign keyless-sign npm tarball
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -z "$TAG" ] && TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun (for prepack build)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Build the npm tarball
        run: |
          cd dashboard-ui && npm ci && npm run build:all && cd ..
          npm pack
          ls -la loki-mode-*.tgz

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign tarball (keyless)
        run: |
          TARBALL=$(ls loki-mode-*.tgz | head -1)
          echo "Signing $TARBALL"
          cosign sign-blob \
            --yes \
            --output-signature "${TARBALL}.sig" \
            --output-certificate "${TARBALL}.pem" \
            "$TARBALL"
          echo "Generated:"
          ls -la "${TARBALL}.sig" "${TARBALL}.pem"

      - name: Self-verify the signature
        run: |
          TARBALL=$(ls loki-mode-*.tgz | head -1)
          cosign verify-blob \
            --signature "${TARBALL}.sig" \
            --certificate "${TARBALL}.pem" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/provenance.yml@.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$TARBALL"

      - name: Upload signature artifacts (also published to sigstore transparency log)
        uses: actions/upload-artifact@v4
        with:
          name: provenance-${{ steps.tag.outputs.tag }}
          path: |
            loki-mode-*.tgz
            loki-mode-*.tgz.sig
            loki-mode-*.tgz.pem
          retention-days: 365

      - name: Attach signature artifacts to release (best-effort)
        # GitHub Releases are immutable by default. If the release is still
        # mutable (rare), this attaches the signatures alongside the tarball.
        # If not, the signature is still publicly verifiable via the
        # sigstore Rekor transparency log -- no action needed by users.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          TARBALL=$(ls loki-mode-*.tgz | head -1)
          gh release upload "$TAG" "${TARBALL}.sig" "${TARBALL}.pem" --clobber \
            || echo "Release is immutable; signature available in sigstore Rekor and as workflow artifact."

  sign-docker-image:
    name: cosign keyless-sign Docker image digests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -z "$TAG" ] && TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Login to Docker Hub (read-only manifest pull is fine without)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image digest
        id: digest
        run: |
          # docker buildx imagetools returns the multi-arch manifest digest
          DIGEST=$(docker buildx imagetools inspect "asklokesh/loki-mode:${{ steps.tag.outputs.version }}" \
            --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"')
          if [ -z "$DIGEST" ]; then
            echo "::error::could not resolve image digest for asklokesh/loki-mode:${{ steps.tag.outputs.version }}"
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Image digest: $DIGEST"

      - name: Sign image (keyless)
        run: |
          REF="asklokesh/loki-mode@${{ steps.digest.outputs.digest }}"
          echo "Signing $REF"
          cosign sign --yes "$REF"
          echo "Image signed. Verify with:"
          echo "  cosign verify --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.github/workflows/provenance.yml@.*' \\"
          echo "    --certificate-oidc-issuer https://token.actions.githubusercontent.com $REF"
