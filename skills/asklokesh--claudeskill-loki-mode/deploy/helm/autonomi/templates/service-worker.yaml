{{- /*
A run-to-completion worker Job serves no traffic and needs no Service. This
headless Service renders ONLY for the (not-yet-implemented) long-running
queue-consumer Deployment mode.
*/}}
{{- if eq .Values.worker.mode "deployment" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "autonomi.fullname" . }}-worker
  labels:
    {{- include "autonomi.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  clusterIP: None
  selector:
    {{- include "autonomi.worker.selectorLabels" . | nindent 4 }}
{{- end }}
