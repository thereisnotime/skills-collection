{{- include "autonomi.controlplane.preflight" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "autonomi.fullname" . }}-controlplane
  labels:
    {{- include "autonomi.labels" . | nindent 4 }}
    app.kubernetes.io/component: controlplane
spec:
  replicas: {{ .Values.controlplane.replicas }}
  selector:
    matchLabels:
      {{- include "autonomi.controlplane.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.controlplane.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "autonomi.controlplane.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "autonomi.serviceAccountName" . }}
      automountServiceAccountToken: true
      securityContext:
        {{- toYaml .Values.security.podSecurityContext | nindent 8 }}
      containers:
        - name: controlplane
          image: {{ include "autonomi.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python3
            - "-m"
            - uvicorn
            - "dashboard.server:app"
            - "--host"
            - {{ .Values.config.dashboardHost | quote }}
            # Honor config.dashboardPort so the documented knob actually changes
            # the bind port. Previously this was hardcoded 57374, so setting
            # config.dashboardPort only changed the LOKI_DASHBOARD_PORT env var
            # (which uvicorn ignores) while uvicorn still bound 57374 -- and a
            # probe pointed at the configured port would crash-loop the pod.
            - "--port"
            - {{ .Values.config.dashboardPort | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.config.dashboardPort | int }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: {{ .Values.controlplane.probes.readiness.path }}
              # Default to the named container port so the probe always tracks the
              # actual bind port (config.dashboardPort). An explicit numeric
              # probes.*.port still overrides if set. Previously this defaulted to a
              # literal 57374 that could diverge from config.dashboardPort and
              # crash-loop the pod.
              port: {{ .Values.controlplane.probes.readiness.port | default "http" }}
            initialDelaySeconds: {{ .Values.controlplane.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.controlplane.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.controlplane.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.controlplane.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.controlplane.probes.liveness.path }}
              port: {{ .Values.controlplane.probes.liveness.port | default "http" }}
            initialDelaySeconds: {{ .Values.controlplane.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.controlplane.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.controlplane.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.controlplane.probes.liveness.failureThreshold }}
          envFrom:
            - configMapRef:
                name: {{ include "autonomi.fullname" . }}
            - secretRef:
                name: {{ include "autonomi.secretName" . }}
          {{- with .Values.controlplane.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.controlplane.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.security.containerSecurityContext | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.auditLogs.enabled }}
            # Mount at the exact directory dashboard/audit.py writes to
            # ($HOME/.loki/dashboard/audit; HOME=/home/loki), so the
            # tamper-evident hash-chain JSONL is durable across pod loss. The old
            # /data/audit mount was inert: the code never wrote there. We mount
            # the audit subdir specifically, NOT .../dashboard, to avoid shadowing
            # the machine-local projects.json registry under .../dashboard.
            - name: audit-logs
              mountPath: /home/loki/.loki/dashboard/audit
            {{- end }}
      volumes:
        {{- if .Values.persistence.auditLogs.enabled }}
        - name: audit-logs
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.auditLogs.existingClaim | default (printf "%s-audit-logs" (include "autonomi.fullname" .)) }}
        {{- end }}
      {{- with .Values.controlplane.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlplane.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlplane.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
