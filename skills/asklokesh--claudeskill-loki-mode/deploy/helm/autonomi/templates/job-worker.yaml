{{- if ne .Values.worker.mode "deployment" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "autonomi.fullname" . }}-worker
  labels:
    {{- include "autonomi.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  # backoffLimit bounds retries of a CRASHED build. A deterministic terminal
  # failure (exit 20) is failed immediately by podFailurePolicy below, not retried.
  backoffLimit: {{ .Values.worker.backoffLimit }}
  # Hard wall-clock ceiling on a single build. Replaces the old liveness probe,
  # which could never detect a wedged build (pgrep -f loki matched the hung
  # process and the probe shell itself).
  activeDeadlineSeconds: {{ .Values.worker.activeDeadlineSeconds }}
  # Enforce the run.sh process-exit contract cluster-side. Without this a Job
  # retries ANY nonzero exit, so a deterministically-failing build (exit 20)
  # would burn the whole backoffLimit before failing.
  #   exit 20 (terminal failure) -> fail the Job NOW, do not retry.
  #   eviction / node-loss       -> do NOT count against backoffLimit (clean
  #                                 pod-loss resume off the durable volume).
  #   any other nonzero / SIGKILL-> counts as a crash, retries up to backoffLimit.
  # podFailurePolicy requires restartPolicy: Never (stable in Kubernetes 1.31+).
  podFailurePolicy:
    rules:
      - action: FailJob
        onExitCodes:
          containerName: worker
          operator: In
          values:
            - {{ .Values.worker.exitCodes.terminalFailure }}
      - action: Ignore
        onPodConditions:
          - type: DisruptionTarget
  template:
    metadata:
      {{- with .Values.worker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "autonomi.worker.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "autonomi.serviceAccountName" . }}
      # podFailurePolicy requires restartPolicy: Never. On a crash the Job
      # controller starts a FRESH pod (Never does not restart the container in
      # place); that pod re-mounts the durable /workspace PVC and resumes from
      # the last checkpoint via the run.sh crash-resume path.
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.security.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "autonomi.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - loki
            - start
          {{- if .Values.worker.spec }}
          # Spec injection (ENT-7): a PRD path on /workspace or a GitHub issue ref.
          # Omitted when worker.spec is empty -> codebase-analysis of /workspace.
          args:
            - {{ .Values.worker.spec | quote }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "autonomi.fullname" . }}
            - secretRef:
                name: {{ include "autonomi.secretName" . }}
          env:
            # Activates the run.sh durable-state assertion, crash-resume, and the
            # process-exit contract honored by podFailurePolicy above. All
            # per-build state is written under /workspace (the WORKDIR), which is
            # backed by the durable volume mounted below.
            - name: LOKI_DURABLE_STATE
              value: "1"
            {{- with .Values.worker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.security.containerSecurityContext | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.checkpoints.enabled }}
            # ONE durable volume at the WORKDIR makes the entire per-build state
            # (.loki/state, checkpoints, queue, signals, the worker JSONL audit,
            # the feature branch, refs/loki/cp/* in .git) survive pod loss.
            - name: workspace
              mountPath: /workspace
            {{- end }}
      volumes:
        {{- if .Values.persistence.checkpoints.enabled }}
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.checkpoints.existingClaim | default (printf "%s-checkpoints" (include "autonomi.fullname" .)) }}
        {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
