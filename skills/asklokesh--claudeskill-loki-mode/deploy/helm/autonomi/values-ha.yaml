# Autonomi Loki Mode - High Availability Values
# -----------------------------------------------
# Use with: helm install autonomi ./deploy/helm/autonomi \
#   -f deploy/helm/autonomi/values-production.yaml \
#   -f deploy/helm/autonomi/values-ha.yaml

controlplane:
  replicas: 3

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - controlplane
          topologyKey: kubernetes.io/hostname

# The worker is a run-to-completion Job: a single pod per release. replicas,
# autoscaling, and worker pod-anti-affinity (which spreads multiple replicas)
# do not apply and are intentionally omitted.

persistence:
  # /workspace durable volume. ReadWriteOnce is correct: a single Job pod (and
  # its retry) mounts it. ReadWriteMany is NOT needed for the Job model and is
  # intentionally not set here.
  checkpoints:
    enabled: true
    size: 100Gi

  # Control-plane hash-chain audit volume. ReadWriteMany if the control-plane
  # runs multiple replicas sharing the chain; default RWO otherwise. Left at the
  # chart default here (set persistence.auditLogs.accessMode if you run >1
  # control-plane replica on a shared audit volume).
  auditLogs:
    enabled: true
    size: 200Gi

security:
  networkPolicy:
    enabled: true

  rbac:
    enabled: true

pdb:
  enabled: true
  minAvailable: 1
