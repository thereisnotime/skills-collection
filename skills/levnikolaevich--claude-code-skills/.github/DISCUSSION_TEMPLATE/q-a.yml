title: "[Q&A] "
body:
  - type: markdown
    attributes:
      value: |
        Need help? Check the [FAQ](https://github.com/levnikolaevich/claude-code-skills#faq) first — your question might already be answered.
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Installation / Plugin setup
        - MCP server configuration
        - Skill usage / workflow
        - Linear integration
        - File Mode (kanban_board.md)
        - Multi-model AI review (Codex/Gemini)
        - Agent Teams / ln-1000
        - Other
    validations:
      required: true
  - type: input
    id: skill
    attributes:
      label: Related Skill (if any)
      placeholder: "e.g., ln-400-story-executor"
    validations:
      required: false
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe what you need help with. Include error messages if applicable.
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What I Tried
      description: What steps have you already taken? This helps us avoid suggesting things you've already done.
      placeholder: |
        1. I tried ...
        2. I checked ...
        3. The error I got was ...
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Claude Code version, OS, relevant MCP servers
      placeholder: |
        - Claude Code: v1.0.x
        - OS: Windows 11 / macOS 14 / Ubuntu 24
        - MCP servers: Context7, Ref, Linear
    validations:
      required: false
