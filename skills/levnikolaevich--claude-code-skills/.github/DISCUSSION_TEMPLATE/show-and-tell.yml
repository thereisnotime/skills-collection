title: "[Showcase] "
body:
  - type: markdown
    attributes:
      value: |
        Show off what you've built or how you're using Claude Code Skills! Screenshots, metrics, and links are welcome.
  - type: textarea
    id: description
    attributes:
      label: What did you build or achieve?
      description: Describe your project, workflow, or results.
    validations:
      required: true
  - type: textarea
    id: skills-used
    attributes:
      label: Skills Used
      description: Which skills did you use? How did they fit into your workflow?
      placeholder: "ln-700 for bootstrap, ln-200 for planning, ln-400 for execution..."
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: Results / Outcomes
      description: What was the impact? Time saved, quality improvements, metrics?
    validations:
      required: false
  - type: textarea
    id: links
    attributes:
      label: Links
      description: Repository URL, screenshots, blog post, or demo — anything that shows the work.
    validations:
      required: false
