name: Publish hex-ssh-mcp

on:
  push:
    tags: ['hex-ssh-v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: cd mcp && npm install --ignore-scripts

      - name: Build bundle
        run: cd mcp/hex-ssh-mcp && npm run build

      - name: Publish to npm
        run: cd mcp/hex-ssh-mcp && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version
        run: |
          VERSION=${GITHUB_REF#refs/tags/hex-ssh-v}
          cd mcp/hex-ssh-mcp
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: cd mcp/hex-ssh-mcp && ../../mcp-publisher publish
