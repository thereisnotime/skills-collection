# Vulture Configuration Template
# Generated by ln-741-linter-configurator
# Detects unused code (functions, variables, imports).
# Run: uv run vulture src/ --min-confidence 80
# Docs: https://github.com/jendrikseipp/vulture

[tool.vulture]
min_confidence = 80
# CUSTOMIZE: set to your source directory
paths = ["src/"]
exclude = [".venv/", "tests/"]
# CUSTOMIZE: add false positives (FastAPI DI, Pydantic, SQLAlchemy)
ignore_names = [
    "model_config",     # Pydantic
    "__tablename__",    # SQLAlchemy
    "_*",               # Protocol/private params
]
