name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/linear-ops.js || { echo "Missing dist/linear-ops.js"; exit 1; }
          test -f dist/query.js || { echo "Missing dist/query.js"; exit 1; }
          test -f dist/setup.js || { echo "Missing dist/setup.js"; exit 1; }
          node dist/linear-ops.js help > /dev/null

      - name: Smoke tests
        run: npm test
