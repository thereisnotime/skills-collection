[settings]
experimental = true
lockfile = true

[tools]
node = "lts"

[env]
_.path = ["{{config_root}}/node_modules/.bin"]
_.file = [".env", "packages/evals/.env"]

[tasks.install]
description = "Install all dependencies"
run = "npm install"
sources = ["package.json"]
outputs = ["node_modules/.package-lock.json"]

[tasks.test]
description = "Run tests"
run = "vitest run"
sources = ["test/**", "skills/**"]
