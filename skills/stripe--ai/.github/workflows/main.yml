name: CI
permissions:
  contents: read

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  typescript-build:
    name: Build - TypeScript
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./tools/typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - name: Node
        uses: actions/setup-node@v5
        with:
          node-version: "18"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Clean
        run: pnpm run clean

      - name: Lint
        run: pnpm run lint

      - name: Prettier
        run: pnpm run prettier-check

      - name: Test
        run: pnpm run test

  modelcontextprotocol-build:
    name: Build - Model Context Protocol
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./tools/modelcontextprotocol

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - name: Node
        uses: actions/setup-node@v5
        with:
          node-version: "18"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Clean
        run: pnpm run clean

      - name: Lint
        run: pnpm run lint

      - name: Prettier
        run: pnpm run prettier-check

      - name: Test
        run: pnpm run test

  skills-sync-check:
    name: Check - Skills in sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify provider skill directories match source
        run: |
          out_of_sync=false

          for provider in claude cursor; do
            target="providers/$provider/plugin/skills"

            for skill_dir in skills/*/; do
              skill_name="$(basename "$skill_dir")"
              diff -r "skills/$skill_name" "$target/$skill_name" > /dev/null 2>&1 || {
                echo "❌ $target/$skill_name is out of sync with skills/$skill_name"
                diff -r "skills/$skill_name" "$target/$skill_name" || true
                out_of_sync=true
              }
            done
          done

          if [ "$out_of_sync" = true ]; then
            echo ""
            echo "Fix: run ./scripts/sync-skills.sh and commit the result."
            exit 1
          fi

          echo "✅ All provider skill directories are in sync."

  python-build:
    name: Build - Python
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./tools/python

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install
        run: make venv

      - name: Build
        run: |
          set -x
          source .venv/bin/activate
          rm -rf build dist *.egg-info
          make build
          python -m twine check dist/*

      - name: Test
        run: |
          make venv
          make test
