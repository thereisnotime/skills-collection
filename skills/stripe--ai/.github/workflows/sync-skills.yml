name: Sync skills from docs.stripe.com

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at 00:00 UTC
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Run sync script
        run: node skills/sync.js

      # This action will only create a PR if there are actual changes to the file
      # If the content is identical, no PR will be created
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'sync skills from docs.stripe.com/.well-known/skills'
          title: '[automated] sync skills from docs.stripe.com'
          body: |
            This is an automated PR created by the sync-skills workflow.

            Synced from `https://docs.stripe.com/.well-known/skills/` via the [agent skills discovery RFC](https://github.com/cloudflare/agent-skills-discovery-rfc).

            Updates skills in:
            - skills/ (source)
            - providers/claude/plugin/skills/
            - providers/cursor/plugin/skills/
          branch: sync-skills-update
          delete-branch: true
          add-paths: |
            skills/**/*.md
            providers/claude/plugin/skills/
            providers/cursor/plugin/skills/

      - name: Check outputs
        if: steps.cpr.outputs.pull-request-number
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"

