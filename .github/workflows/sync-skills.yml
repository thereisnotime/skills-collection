name: "\U0001F504 Sync Skills"
run-name: "\U0001F504 Syncing ${{ github.event_name == 'schedule' && 'on schedule' || 'manually triggered' }} by @${{ github.actor }}"

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: "\U0001F4E6 Sync & Update"
    runs-on: ubuntu-latest
    steps:
      - name: "\U0001F4E5 Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: "\U0001F40D Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "\U0001F4E6 Install dependencies"
        run: pip install matplotlib

      - name: "\U0001F504 Sync repos & generate README"
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: python generate_readme.py

      - name: "\U0001F4BE Commit & push"
        run: |
          git config user.name "thereisnotime"
          git config user.email "37583483+thereisnotime@users.noreply.github.com"
          git add README.md stats.json history.json commits.json charts/ skills/
          git diff --cached --quiet && echo "✅ Nothing changed" && exit 0
          git commit -m "sync: update skills repos, readme and charts"
          git push
          echo "🚀 Changes pushed"

      - name: "\U0001F310 Push data to site repo"
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          SITE_REPO="Heliopsy/awesome-ai-skills.yourtech.stream-site"
          echo "Cloning site repo..."
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${SITE_REPO}.git" /tmp/site
          mkdir -p /tmp/site/data
          cp inventory.json stats.json history.json commits.json /tmp/site/data/
          cd /tmp/site
          git config user.name "thereisnotime"
          git config user.email "37583483+thereisnotime@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "✅ Site data unchanged" && exit 0
          git commit -m "data: update from skills-collection sync"
          git push
          echo "🚀 Site data pushed"
