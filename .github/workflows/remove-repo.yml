name: "\u2796 Remove Skill Repo"
run-name: "\u2796 Removing ${{ inputs.repo_dir }} by @${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      repo_dir:
        description: "Repo dir name to remove (e.g. slavingia--skills). Check inventory.json for the list."
        required: true
        type: string

permissions:
  contents: write

jobs:
  remove:
    name: "\U0001F5D1 Validate & Remove"
    runs-on: ubuntu-latest
    steps:
      - name: "\U0001F4E5 Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "\U0001F4CB Show current inventory"
        run: |
          echo "📋 Current repos in inventory:"
          python3 -c "
          import json
          inv = json.loads(open('inventory.json').read())
          for r in inv:
              print(f'  • {r[\"dir\"]}  →  {r[\"url\"]}')
          "

      - name: "\U0001F50D Validate & remove from inventory"
        run: |
          python3 -c "
          import json, sys

          inv = json.loads(open('inventory.json').read())
          target = '${{ inputs.repo_dir }}'
          match = [r for r in inv if r['dir'] == target]

          if not match:
              print(f'❌ \"{target}\" not found in inventory. Available dirs:')
              for r in inv:
                  print(f'  • {r[\"dir\"]}')
              sys.exit(1)

          inv = [r for r in inv if r['dir'] != target]
          open('inventory.json', 'w').write(json.dumps(inv, indent=2) + '\n')
          print(f'🗑️ Removed {target} from inventory')
          "

      - name: "\U0001F4BE Commit & push"
        run: |
          git config user.name "thereisnotime"
          git config user.email "37583483+thereisnotime@users.noreply.github.com"
          git add inventory.json
          git diff --cached --quiet && echo "⚠️ Nothing changed" && exit 0
          git commit -m "inventory: remove ${{ inputs.repo_dir }}"
          git push
          echo "🚀 Inventory updated — Sync Skills workflow will clean up and regenerate"
