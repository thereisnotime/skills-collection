name: "\u2796 Remove Skill Repo"
run-name: "\u2796 Removing ${{ inputs.repo_dir }} by @${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      repo_dir:
        description: "Select repo to remove"
        required: true
        type: choice
        options:
          - slavingia--skills
          - zarazhangrui--codebase-to-course
          - samber--cc-skills-golang
          - realkimbarrett--advertising-skills
          - abubakarsiddik31--claude-skills-collection

permissions:
  contents: write
  actions: write

jobs:
  remove:
    name: "\U0001F5D1 Validate & Remove"
    runs-on: ubuntu-latest
    steps:
      - name: "\U0001F4E5 Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: "\U0001F50D Validate & remove from inventory"
        env:
          REMOVE_TARGET: ${{ inputs.repo_dir }}
        run: |
          python3 << 'PYEOF'
          import json, sys, os

          inv = json.loads(open('inventory.json').read())
          target = os.environ['REMOVE_TARGET']
          match = [r for r in inv if r['dir'] == target]

          if not match:
              print(f'❌ "{target}" not found in inventory')
              sys.exit(1)

          print(f'🗑️ Removing {target} ({match[0]["url"]})')
          inv = [r for r in inv if r['dir'] != target]
          open('inventory.json', 'w').write(json.dumps(inv, indent=2) + '\n')
          PYEOF

      - name: "\U0001F504 Update remove workflow dropdown"
        run: |
          python3 << 'PYEOF'
          import json, re

          inv = json.loads(open('inventory.json').read())
          options = '\n'.join(f'          - {r["dir"]}' for r in inv)
          wf = open('.github/workflows/remove-repo.yml').read()
          wf = re.sub(
              r'(options:\n)((?:          - .+\n)*)',
              f'options:\n{options}\n',
              wf
          )
          open('.github/workflows/remove-repo.yml', 'w').write(wf)
          print('📝 Updated dropdown options')
          PYEOF

      - name: "\U0001F4BE Commit & push"
        run: |
          git config user.name "thereisnotime"
          git config user.email "37583483+thereisnotime@users.noreply.github.com"
          git add inventory.json .github/workflows/remove-repo.yml
          git diff --cached --quiet && echo "⚠️ Nothing changed" && exit 0
          git commit -m "inventory: remove ${{ inputs.repo_dir }}"
          git push
          echo "🚀 Inventory updated"

      - name: "\U0001F504 Trigger sync"
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh workflow run sync-skills.yml -R thereisnotime/skills-collection
          echo "🔄 Sync Skills workflow triggered to clean up"
